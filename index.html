function generateId() {
  return Date.now().toString(36) + '-' + Math.random().toString(36).substr(2, 9);
}

const Store = {
  _data: null,

  init() {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) {
      try {
        this._data = JSON.parse(raw);
        this._data = this._merge(this._data, DEFAULT_STATE);
        this._data.version = STORE_VERSION;
      } catch {
        this._data = JSON.parse(JSON.stringify(DEFAULT_STATE));
      }
    } else {
      this._data = JSON.parse(JSON.stringify(DEFAULT_STATE));
    }
    this._save();
    return this._data;
  },

  _merge(stored, defaults) {
    const result = { ...stored };
    for (const key of Object.keys(defaults)) {
      if (result[key] === undefined) {
        result[key] = JSON.parse(JSON.stringify(defaults[key]));
      } else if (typeof defaults[key] === 'object' && defaults[key] !== null && !Array.isArray(defaults[key])) {
        result[key] = this._merge(result[key], defaults[key]);
      }
    }
    return result;
  },

  get(path) {
    if (!this._data) this.init();
    if (!path) return JSON.parse(JSON.stringify(this._data));
    return path.split('.').reduce((acc, k) => acc?.[k], this._data);
  },

  set(path, value) {
    if (!this._data) this.init();
    const keys = path.split('.');
    let target = this._data;
    for (let i = 0; i < keys.length - 1; i++) {
      if (target[keys[i]] === undefined) target[keys[i]] = {};
      target = target[keys[i]];
    }
    target[keys[keys.length - 1]] = value;
    this._data.lastUpdated = new Date().toISOString();
    this._save();
  },

  push(path, item) {
    if (!this._data) this.init();
    const arr = this.get(path);
    if (!Array.isArray(arr)) return null;
    item.id = item.id || generateId();
    item.createdAt = item.createdAt || new Date().toISOString();
    item.updatedAt = new Date().toISOString();
    arr.push(item);
    this.set(path, arr);
    return item;
  },

  update(path, id, updates) {
    const arr = this.get(path);
    if (!Array.isArray(arr)) return null;
    const idx = arr.findIndex(i => i.id === id);
    if (idx === -1) return null;
    Object.assign(arr[idx], updates, { updatedAt: new Date().toISOString() });
    this.set(path, arr);
    return arr[idx];
  },

  remove(path, id) {
    const arr = this.get(path);
    if (!Array.isArray(arr)) return false;
    const idx = arr.findIndex(i => i.id === id);
    if (idx === -1) return false;
    arr.splice(idx, 1);
    this.set(path, arr);
    return true;
  },

  _save() {
    try {
      localStorage.setItem(STORE_KEY, JSON.stringify(this._data));
    } catch (e) {
      console.error('Store: localStorage write failed', e);
    }
  },

  getSprintInfo() {
    const startStr = this.get('settings.sprint_start_date');
    if (!startStr) return { number: '—', day: '—', label: 'No sprint configured' };
    const start = new Date(startStr);
    const now = new Date();
    const diff = Math.floor((now - start) / (1000 * 60 * 60 * 24));
    if (diff < 0) return { number: 1, day: '—', label: `Sprint starts ${startStr}` };
    const duration = this.get('settings.sprint_duration') || 14;
    const sprintNum = Math.floor(diff / duration) + 1;
    const dayInSprint = (diff % duration) + 1;
    return { number: sprintNum, day: dayInSprint, label: `S${sprintNum} · Day ${dayInSprint}/${duration}` };
  },

  logActivity(action, detail) {
    if (!this._data) this.init();
    this._data.activity.unshift({ id: generateId(), action, detail: detail || '', timestamp: new Date().toISOString() });
    if (this._data.activity.length > 50) this._data.activity = this._data.activity.slice(0, 50);
    this._save();
  }
};

// Initialize store
Store.init();

function Toast({ message, type = 'info', onClose }) {
  useEffect(() => {
    const t = setTimeout(onClose, 3000);
    return () => clearTimeout(t);
  }, []);
  const bg = type === 'success' ? 'rgba(151,203,0,0.15)' : type === 'error' ? 'rgba(232,80,58,0.15)' : 'rgba(71,130,211,0.15)';
  const border = type === 'success' ? 'var(--green)' : type === 'error' ? 'var(--red)' : 'var(--blue)';
  return (
    <div style={{ position:'fixed',bottom:20,right:20,background:bg,border:`1px solid ${border}`,borderRadius:6,padding:'10px 16px',fontSize:12,color:'var(--muted-light)',zIndex:9999,maxWidth:360,fontFamily:'var(--font-body)' }}>
      {message}
    </div>
  );
}

/* ============================================================
   MODAL SYSTEM
   ============================================================ */
function Modal({ title, children, onClose, onConfirm, confirmText = 'Confirm', danger = false }) {
  useEffect(() => {
    const handler = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, []);
  return (
    <div onClick={(e) => { if (e.target === e.currentTarget) onClose(); }}
      style={{ position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000 }}
      role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div style={{ background:'var(--navy-light)',border:'1px solid rgba(71,130,211,0.15)',borderRadius:8,padding:24,minWidth:400,maxWidth:540,maxHeight:'80vh',overflow:'auto' }}>
        <div id="modal-title" style={{ fontFamily:'var(--font-display)',fontWeight:700,fontSize:16,color:'var(--white)',marginBottom:16 }}>{title}</div>
        <div style={{ marginBottom:20 }}>{children}</div>
        <div style={{ display:'flex',justifyContent:'flex-end',gap:8 }}>
          <button onClick={onClose} style={{ background:'rgba(71,130,211,0.1)',border:'1px solid rgba(71,130,211,0.2)',borderRadius:4,padding:'6px 14px',fontSize:12,color:'var(--muted-light)' }}>Cancel</button>
          {onConfirm && <button onClick={onConfirm} style={{ background:danger?'var(--red)':'var(--green)',border:'none',borderRadius:4,padding:'6px 14px',fontSize:12,fontWeight:700,color:danger?'var(--white)':'var(--navy-deep)' }}>{confirmText}</button>}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   REQUESTS VIEW (Page 7)
   ============================================================ */
function RequestsView() {
  const nav = useNav();
  const [requests, setRequests] = useState(Store.get('requests') || []);
  const [showModal, setShowModal] = useState(false);
  const [triageId, setTriageId] = useState(null);
  const [showArchived, setShowArchived] = useState(false);
  const [filters, setFilters] = useState({ type: 'all', status: 'all', priority: 'all', assignee: 'all', search: '' });
  const [sortCol, setSortCol] = useState('created_date');
  const [sortAsc, setSortAsc] = useState(false);

  function reload() { setRequests([...(Store.get('requests') || [])]); }

  // Business days calculation
  function businessDays(fromDate) {
    const from = new Date(fromDate);
    const now = new Date();
    let count = 0;
    const d = new Date(from);
    while (d < now) {
      d.setDate(d.getDate() + 1);
      const day = d.getDay();
      if (day !== 0 && day !== 6) count++;
    }
    return count;
  }

  function isOverdue(req) {
    return req.deadline && new Date(req.deadline) < new Date() && !['complete','archived'].includes(req.status);
  }

  function isStale(req) {
    return ['submitted','triaged'].includes(req.status) && businessDays(req.updated_date) > 5;
  }

  // Filter + sort
  let filtered = requests.filter(r => showArchived ? true : r.status !== 'archived');
  if (filters.type !== 'all') filtered = filtered.filter(r => r.type === filters.type);
  if (filters.status !== 'all') filtered = filtered.filter(r => r.status === filters.status);
  if (filters.priority !== 'all') filtered = filtered.filter(r => r.priority === filters.priority);
  if (filters.assignee !== 'all') filtered = filtered.filter(r => r.assignee === filters.assignee);
  if (filters.search.length >= 2) {
    const q = filters.search.toLowerCase();
    filtered = filtered.filter(r => r.title.toLowerCase().includes(q) || (r.description || '').toLowerCase().includes(q));
  }

  filtered.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (sortCol === 'age') { va = businessDays(a.created_date); vb = businessDays(b.created_date); }
    if (sortCol === 'priority') { const order = { P0:0,P1:1,P2:2,P3:3 }; va = order[a.priority]; vb = order[b.priority]; }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  function handleSort(col) {
    if (sortCol === col) setSortAsc(!sortAsc);
    else { setSortCol(col); setSortAsc(false); }
    logEvent('requests_filtered', { filter_type: 'sort', filter_value: col });
  }

  // Status cycle
  function cycleStatus(req) {
    const idx = STATUS_ORDER.indexOf(req.status);
    if (idx === -1 || idx >= STATUS_ORDER.length - 1) return;
    const next = STATUS_ORDER[idx + 1];
    Store.update('requests', req.id, { status: next, updated_date: new Date().toISOString() });
    logEvent('request_status_changed', { request_id: req.id, from_status: req.status, to_status: next });
    if (next === 'blocked') {
      const mailto = `mailto:casey.jones@globalair.com?subject=${encodeURIComponent(`BLOCKED: ${req.title}`)}&body=${encodeURIComponent(`${req.assignee || 'Someone'} marked this ${req.type} request as blocked.\nNotes: ${req.notes || 'None'}`)}`;
      window.open(mailto, '_blank');
    }
    if (next === 'complete') {
      const email = TEAM_EMAILS[req.requestor] || '';
      if (email) {
        const mailto = `mailto:${email}?subject=${encodeURIComponent(`Complete: ${req.title}`)}&body=${encodeURIComponent(`Your ${req.type.replace(/_/g,' ')} request has been completed.`)}`;
        window.open(mailto, '_blank');
      }
    }
    Store.logActivity('status_changed', `${req.title}: ${req.status} → ${next}`);
    reload();
  }

  // Archive all completed
  function archiveAll() {
    const completed = requests.filter(r => r.status === 'complete');
    if (completed.length === 0) return;
    completed.forEach(r => Store.update('requests', r.id, { status: 'archived', updated_date: new Date().toISOString() }));
    nav.showToast(`${completed.length} request${completed.length > 1 ? 's' : ''} archived.`, 'success');
    reload();
  }

  const completedCount = requests.filter(r => r.status === 'complete').length;
  const hasActiveFilters = filters.type !== 'all' || filters.status !== 'all' || filters.priority !== 'all' || filters.assignee !== 'all' || filters.search.length >= 2;

  // Priority badge
  function PriorityBadge({ p }) {
    const colors = { P0: 'var(--red)', P1: 'var(--amber)', P2: 'var(--blue)', P3: 'var(--muted)' };
    return createElement('span', { role: 'note', 'aria-label': `Priority: ${p}`, style: {
      fontSize: 9, fontWeight: 700, padding: '2px 6px', borderRadius: 3,
      background: `${colors[p]}22`, color: colors[p], letterSpacing: '0.03em'
    }}, p);
  }

  // Status badge
  function StatusBadgeReq({ status, onClick }) {
    const s = REQUEST_STATUSES.find(x => x.id === status) || { label: status, color: 'var(--muted)' };
    return createElement('button', { onClick, style: {
      fontSize: 9, fontWeight: 700, padding: '2px 8px', borderRadius: 3, border: 'none',
      background: `${s.color}22`, color: s.color, cursor: onClick ? 'pointer' : 'default',
      letterSpacing: '0.03em', textTransform: 'uppercase'
    }}, s.label);
  }

  // Type badge
  function TypeBadge({ type }) {
    const t = REQUEST_TYPES.find(x => x.id === type) || { label: type, color: 'var(--muted)' };
    return createElement('span', { style: {
      fontSize: 9, fontWeight: 600, padding: '2px 6px', borderRadius: 3,
      background: `${t.color}15`, color: t.color
    }}, t.label);
  }

  // Team member display
  function teamName(key) {
    const names = { casey:'Casey', keaton:'Keaton', sydney:'Sydney', jadda:'Jadda', abby:'Abby', ashley:'Ashley' };
    return names[key] || key || '—';
  }

  // Select dropdown helper
  function FilterSelect({ value, onChange, options, label }) {
    return createElement('select', {
      value, onChange: e => { onChange(e.target.value); logEvent('requests_filtered', { filter_type: label, filter_value: e.target.value }); },
      style: { background: 'var(--navy-light)', color: 'var(--muted-light)', border: '1px solid rgba(71,130,211,0.12)',
        borderRadius: 4, padding: '5px 8px', fontSize: 11, outline: 'none' }
    }, ...options.map(o => createElement('option', { key: o.value, value: o.value }, o.label)));
  }

  // Triage panel
  function TriagePanel({ req }) {
    const [assignee, setAssignee] = useState(REQUEST_ASSIGNEE_DEFAULTS[req.type] || 'casey');
    const [priority, setPriority] = useState(req.priority);
    const [notes, setNotes] = useState(req.notes || '');

    function confirm() {
      const changed = priority !== req.priority;
      Store.update('requests', req.id, { status: 'triaged', assignee, priority, notes, updated_date: new Date().toISOString() });
      logEvent('request_triaged', { request_id: req.id, priority_changed: changed });
      Store.logActivity('triaged', `${req.title} → ${teamName(assignee)}`);
      setTriageId(null);
      reload();
    }

    return (
      <tr><td colSpan={9} style={{ padding: 0 }}>
        <div role="region" aria-label={`Triage request: ${req.title}`}
          style={{ background: 'rgba(71,130,211,0.04)', padding: 12, borderTop: '1px solid rgba(71,130,211,0.1)' }}>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12, marginBottom: 10 }}>
            <div>
              <div style={{ fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase', fontWeight: 700, marginBottom: 4 }}>Assignee</div>
              <select value={assignee} onChange={e => setAssignee(e.target.value)}
                style={{ width: '100%', background: 'var(--navy)', color: 'var(--white)', border: '1px solid rgba(71,130,211,0.15)', borderRadius: 4, padding: '5px 8px', fontSize: 12 }}>
                {Object.keys(TEAM_EMAILS).map(k => <option key={k} value={k}>{teamName(k)}</option>)}
              </select>
            </div>
            <div>
              <div style={{ fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase', fontWeight: 700, marginBottom: 4 }}>Priority Override</div>
              <div style={{ display: 'flex', gap: 4 }}>
                {['P0','P1','P2','P3'].map(p => (
                  <button key={p} onClick={() => setPriority(p)}
                    style={{
                      flex: 1, padding: '4px 0', fontSize: 10, fontWeight: 700, borderRadius: 3, border: 'none',
                      background: priority === p ? { P0:'var(--red)',P1:'var(--amber)',P2:'var(--blue)',P3:'var(--muted)' }[p] : 'rgba(71,130,211,0.08)',
                      color: priority === p ? '#fff' : 'var(--muted)'
                    }}>{p}</button>
                ))}
              </div>
            </div>
            <div>
              <div style={{ fontSize: 9, color: 'var(--muted)', textTransform: 'uppercase', fontWeight: 700, marginBottom: 4 }}>Notes</div>
              <textarea value={notes} onChange={e => setNotes(e.target.value)} rows={2}
                style={{ width: '100%', background: 'var(--navy)', color: 'var(--white)', border: '1px solid rgba(71,130,211,0.15)', borderRadius: 4, padding: '5px 8px', fontSize: 11, resize: 'none' }} />
            </div>
          </div>
          <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
            <button onClick={() => setTriageId(null)}
              style={{ background: 'none', border: '1px solid rgba(71,130,211,0.15)', color: 'var(--muted)', borderRadius: 4, padding: '5px 14px', fontSize: 11 }}>Cancel</button>
            <button onClick={confirm}
              style={{ background: 'var(--green)', color: 'var(--navy-deep)', border: 'none', borderRadius: 4, padding: '5px 14px', fontSize: 11, fontWeight: 700 }}>Confirm Triage</button>
          </div>
        </div>
      </td></tr>
    );
  }

  // New Request Modal
  function NewRequestModal() {
    const [type, setType] = useState('');
    const [title, setTitle] = useState('');
    const [desc, setDesc] = useState('');
    const [priority, setPriority] = useState('');
    const [deadline, setDeadline] = useState('');
    const [briefId, setBriefId] = useState('');
    const canSubmit = type && title.trim() && priority;

    function submit() {
      const req = {
        id: generateId(), type, title: title.trim(), description: desc.trim(), priority, status: 'submitted',
        requestor: 'keaton', assignee: null,
        deadline: deadline ? new Date(deadline).toISOString() : null,
        related_brief_id: briefId.trim() || null,
        created_date: new Date().toISOString(), updated_date: new Date().toISOString(), notes: ''
      };
      Store.push('requests', req);
      logEvent('request_submitted', { request_type: type, priority, has_deadline: !!deadline });
      Store.logActivity('request_submitted', `New ${type}: ${title}`);

      // mailto to Casey
      const typeLabel = REQUEST_TYPES.find(t => t.id === type)?.label || type;
      const subject = `New ${typeLabel} Request: ${title}`;
      const body = `Type: ${typeLabel}\nTitle: ${title}\nDescription: ${desc}\nPriority: ${priority}\nDeadline: ${deadline || 'None'}\nRelated Brief: ${briefId || 'None'}`;
      const mailto = `mailto:casey.jones@globalair.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      window.open(mailto, '_blank');

      setShowModal(false);
      reload();
      nav.showToast('Request submitted successfully.', 'success');
    }

    return (
      <div role="dialog" aria-modal="true" onClick={e => { if (e.target === e.currentTarget) setShowModal(false); }}
        style={{ position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000 }}>
        <div style={{ background:'var(--navy)',borderRadius:10,border:'1px solid rgba(71,130,211,0.12)',padding:24,width:'100%',maxWidth:540 }}
          onClick={e => e.stopPropagation()}>
          <div style={{ fontFamily:'var(--font-display)',fontWeight:700,fontSize:16,color:'var(--white)',marginBottom:16 }}>New Request</div>

          {/* Type */}
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:10,color:'var(--muted)',textTransform:'uppercase',fontWeight:700,marginBottom:4 }}>Type</div>
            <select value={type} onChange={e => setType(e.target.value)}
              style={{ width:'100%',background:'var(--navy-light)',color:'var(--white)',border:'1px solid rgba(71,130,211,0.15)',borderRadius:4,padding:'7px 10px',fontSize:13 }}>

          </div>

          {/* Title */}
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:10,color:'var(--muted)',textTransform:'uppercase',fontWeight:700,marginBottom:4 }}>Title *</div>
            <input value={title} onChange={e => setTitle(e.target.value)} maxLength={120}
              style={{ width:'100%',background:'var(--navy-light)',color:'var(--white)',border:'1px solid rgba(71,130,211,0.15)',borderRadius:4,padding:'7px 10px',fontSize:13 }} />
          </div>

          {/* Description */}
          <div style={{ marginBottom:12 }}>
            <div style={{ display:'flex',justifyContent:'space-between',marginBottom:4 }}>
              <div style={{ fontSize:10,color:'var(--muted)',textTransform:'uppercase',fontWeight:700 }}>Description</div>
              <div style={{ fontSize:11,color: desc.length >= 500 ? 'var(--red)' : 'var(--muted)' }}>{desc.length}/500</div>
            </div>
            <textarea value={desc} onChange={e => { if (e.target.value.length <= 500) setDesc(e.target.value); }} rows={3}
              style={{ width:'100%',background:'var(--navy-light)',color:'var(--white)',border:'1px solid rgba(71,130,211,0.15)',borderRadius:4,padding:'7px 10px',fontSize:13,resize:'none' }} />
          </div>

          {/* Priority */}
          <div style={{ marginBottom:12 }}>
            <div style={{ fontSize:10,color:'var(--muted)',textTransform:'uppercase',fontWeight:700,marginBottom:4 }}>Priority *</div>
            <div style={{ display:'flex',gap:6 }}>
              {['P0','P1','P2','P3'].map(p => (
                <button key={p} onClick={() => setPriority(p)}
                  style={{
                    flex:1,padding:'7px 0',fontSize:12,fontWeight:700,borderRadius:4,border:'none',
                    background: priority === p ? { P0:'var(--red)',P1:'var(--amber)',P2:'var(--blue)',P3:'var(--muted)' }[p] : 'var(--navy-light)',
                    color: priority === p ? '#fff' : 'var(--muted-light)'

            </div>
          </div>

          {/* Deadline + Related Brief */}
          <div style={{ display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:16 }}>
            <div>
              <div style={{ fontSize:10,color:'var(--muted)',textTransform:'uppercase',fontWeight:700,marginBottom:4 }}>Deadline (optional)</div>

            </div>
            <div>
              <div style={{ fontSize:10,color:'var(--muted)',textTransform:'uppercase',fontWeight:700,marginBottom:4 }}>Related Brief ID</div>
              <input value={briefId} onChange={e => setBriefId(e.target.value)} placeholder="e.g. brief-abc123"
                style={{ width:'100%',background:'var(--navy-light)',color:'var(--white)',border:'1px solid rgba(71,130,211,0.15)',borderRadius:4,padding:'7px 10px',fontSize:12 }} />
            </div>
          </div>

          {/* Submit */}
          <button onClick={submit} disabled={!canSubmit}
            style={{ width:'100%',background: canSubmit ? 'var(--green)' : 'var(--navy-light)',

              border:'none',borderRadius:4,padding:'10px',fontSize:13,fontWeight:700 }}>
            Submit Request

          </div>
        </div>

  return (
    <div style={{ padding:20,overflowY:'auto',height:'100%' }}>
      {/* Header */}
      <div style={{ display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16 }}>
        <div>
          <div style={{ fontFamily:'var(--font-display)',fontWeight:700,fontSize:18,color:'var(--white)' }}>Requests</div>
          <div style={{ fontSize:11,color:'var(--muted)',marginTop:2 }}>Team request intake, triage, and status tracking</div>
        </div>
        <div style={{ display:'flex',gap:8 }}>
          <button onClick={() => setShowArchived(!showArchived)}
            style={{ background: showArchived ? 'rgba(71,130,211,0.12)' : 'transparent', color:'var(--muted-light)',
              border:'1px solid rgba(71,130,211,0.12)',borderRadius:4,padding:'6px 12px',fontSize:11 }}>
            {showArchived ? 'Hide Archived' : 'Show Archived'}
          </button>
          <button onClick={archiveAll} disabled={completedCount === 0}
            title={completedCount === 0 ? 'No completed requests to archive' : ''}
            style={{ background:'transparent',color: completedCount > 0 ? 'var(--muted-light)' : 'var(--muted)',
              border:'1px solid rgba(71,130,211,0.12)',borderRadius:4,padding:'6px 12px',fontSize:11,
              opacity: completedCount === 0 ? 0.4 : 1 }}>
            Archive Completed ({completedCount})
          </button>
          <button onClick={() => setShowModal(true)}
            style={{ background:'var(--green)',color:'var(--navy-deep)',border:'none',borderRadius:4,padding:'6px 16px',fontSize:12,fontWeight:700 }}>
            + New Request
          </button>
        </div>
      </div>

      {/* Filter bar */}
      <div style={{ display:'flex',gap:8,alignItems:'center',marginBottom:14,flexWrap:'wrap' }}>
        <FilterSelect value={filters.type} onChange={v => setFilters({...filters, type: v})} label="type"
          options={[{value:'all',label:'All Types'}, ...REQUEST_TYPES.map(t => ({value:t.id,label:t.label}))]} />
        <FilterSelect value={filters.status} onChange={v => setFilters({...filters, status: v})} label="status"
          options={[{value:'all',label:'All Status'}, ...REQUEST_STATUSES.filter(s => s.id !== 'archived').map(s => ({value:s.id,label:s.label}))]} />
        <FilterSelect value={filters.priority} onChange={v => setFilters({...filters, priority: v})} label="priority"
          options={[{value:'all',label:'All Priority'}, {value:'P0',label:'P0'},{value:'P1',label:'P1'},{value:'P2',label:'P2'},{value:'P3',label:'P3'}]} />
        <FilterSelect value={filters.assignee} onChange={v => setFilters({...filters, assignee: v})} label="assignee"
          options={[{value:'all',label:'All Assignees'}, ...Object.keys(TEAM_EMAILS).map(k => ({value:k,label:teamName(k)}))]} />
        <input value={filters.search} onChange={e => setFilters({...filters, search: e.target.value})} placeholder="Search title/description..."
          style={{ background:'var(--navy-light)',color:'var(--white)',border:'1px solid rgba(71,130,211,0.12)',
            borderRadius:4,padding:'5px 10px',fontSize:11,flex:1,minWidth:140,outline:'none' }} />
        {hasActiveFilters && (
          <button onClick={() => setFilters({ type:'all',status:'all',priority:'all',assignee:'all',search:'' })}
            style={{ background:'none',border:'none',color:'var(--blue)',fontSize:11,cursor:'pointer',textDecoration:'underline' }}>
            Clear Filters
          </button>
        )}
      </div>

      {/* Table */}
      <div style={{ background:'var(--navy-light)',borderRadius:8,border:'1px solid rgba(71,130,211,0.08)',overflow:'hidden' }}>
        <table role="table" style={{ width:'100%',borderCollapse:'collapse' }}>
          <thead>
            <tr style={{ borderBottom:'1px solid rgba(71,130,211,0.1)' }}>
              {[
                { key:'type', label:'Type', w:'12%' },
                { key:'title', label:'Title', w:'22%' },
                { key:'priority', label:'Priority', w:'8%' },
                { key:'status', label:'Status', w:'10%' },
                { key:'requestor', label:'From', w:'9%' },
                { key:'assignee', label:'Owner', w:'9%' },
                { key:'deadline', label:'Deadline', w:'12%' },
                { key:'age', label:'Age', w:'7%' },
                { key:'actions', label:'', w:'11%' }
              ].map(col => (
                <th key={col.key} role="columnheader"
                  aria-sort={sortCol === col.key ? (sortAsc ? 'ascending' : 'descending') : 'none'}
                  onClick={() => col.key !== 'actions' && handleSort(col.key)}
                  style={{
                    padding:'8px 10px',fontSize:10,fontWeight:700,textTransform:'uppercase',textAlign:'left',
                    color: sortCol === col.key ? 'var(--blue)' : 'var(--muted)',
                    cursor: col.key !== 'actions' ? 'pointer' : 'default',
                    width: col.w,
                    borderBottom: sortCol === col.key ? '2px solid var(--blue)' : 'none'
                  }}>
                  {col.label} {sortCol === col.key ? (sortAsc ? '▲' : '▼') : ''}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.length === 0 ? (
              <tr><td colSpan={9} style={{ padding:40,textAlign:'center',color:'var(--muted)',fontSize:12 }}>
                {hasActiveFilters ? (
                  <div>No requests match the active filters. <button onClick={() => setFilters({type:'all',status:'all',priority:'all',assignee:'all',search:''})}
                    style={{background:'none',border:'none',color:'var(--blue)',fontSize:12,cursor:'pointer',textDecoration:'underline'}}>Clear Filters</button></div>
                ) : 'No requests yet. Click "+ New Request" to get started.'}
              </td></tr>
            ) : filtered.map(req => {
              const age = businessDays(req.created_date);
              const overdue = isOverdue(req);
              const stale = isStale(req);
              const deadlineStr = req.deadline ? new Date(req.deadline).toLocaleDateString('en-US', { month:'short', day:'numeric' }) : '—';

              return createElement(Fragment, { key: req.id },
                <tr style={{
                  borderBottom:'1px solid rgba(71,130,211,0.06)',
                  borderLeft: overdue ? '3px solid var(--red)' : req.status === 'submitted' ? '3px solid var(--blue)' : '3px solid transparent',
                  transition:'background 150ms'
                }}
                onMouseEnter={e => e.currentTarget.style.background = 'rgba(71,130,211,0.04)'}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
                  <td role="cell" style={{ padding:'8px 10px' }}><TypeBadge type={req.type} /></td>
                  <td role="cell" style={{ padding:'8px 10px',fontSize:12,color:'var(--white)',fontWeight:500 }}>
                    {req.title}
                    {req.related_brief_id && (
                      <button onClick={() => nav.navigate('produce', { highlight_brief_id: req.related_brief_id })}
                        style={{ marginLeft:6,fontSize:9,color:'var(--blue)',background:'none',border:'none',cursor:'pointer',textDecoration:'underline' }}>
                        Brief →
                      </button>
                    )}
                  </td>
                  <td role="cell" style={{ padding:'8px 10px' }}><PriorityBadge p={req.priority} /></td>
                  <td role="cell" style={{ padding:'8px 10px' }}>
                    <StatusBadgeReq status={req.status} onClick={req.status !== 'archived' ? () => cycleStatus(req) : null} />
                  </td>
                  <td role="cell" style={{ padding:'8px 10px',fontSize:11,color:'var(--muted-light)' }}>{teamName(req.requestor)}</td>
                  <td role="cell" style={{ padding:'8px 10px',fontSize:11,color:'var(--muted-light)' }}>{teamName(req.assignee)}</td>
                  <td role="cell" style={{ padding:'8px 10px',fontSize:11,color: overdue ? 'var(--red)' : 'var(--muted-light)',fontWeight: overdue ? 700 : 400 }}>
                    {overdue ? `OVERDUE ${deadlineStr}` : deadlineStr}
                  </td>
                  <td role="cell" style={{ padding:'8px 10px',fontSize:11,color: stale ? 'var(--amber)' : 'var(--muted-light)',fontWeight: stale ? 700 : 400 }}>
                    {age}d
                  </td>
                  <td role="cell" style={{ padding:'8px 10px' }}>
                    {req.status === 'submitted' && (
                      <button onClick={() => setTriageId(triageId === req.id ? null : req.id)}
                        style={{ fontSize:10,color:'var(--green)',background:'none',border:'1px solid var(--green)',borderRadius:3,padding:'3px 10px',cursor:'pointer' }}>
                        Triage
                      </button>
                    )}
                  </td>
                </tr>,
                triageId === req.id ? <TriagePanel req={req} /> : null
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Modal */}
      {showModal && <NewRequestModal />}
    </div>
  );
}

/* ============================================================
   COMMAND VIEW (Page 1)
