        <span style={{ fontSize:10, fontWeight:700, padding:'3px 8px', borderRadius:3, background:'rgba(71,130,211,0.15)', color:'var(--blue)', textTransform:'uppercase' }}>{brief.status.replace(/_/g,' ')}</span>
        {brief.approval_lane === 'yellow' && <span style={{ fontSize:10, fontWeight:700, padding:'3px 8px', borderRadius:3, background:'var(--amber)', color:'var(--navy)' }}>YELLOW LANE</span>}
        <span style={{ fontSize:10, color:'var(--muted)' }}>Age: {briefAge(brief)}d</span>
      </div>

      {/* Platforms */}
      <div style={{ marginBottom:12 }}>
        <div style={labelStyle}>Platforms</div>
        <div style={{ display:'flex', gap:4 }}>
          {(brief.platforms||[]).map(p => (
            <span key={p} style={{ fontSize:10, fontWeight:700, background:platformColors[p], color:'#fff', borderRadius:3, padding:'2px 8px' }}>{platformLabels[p]}</span>
          ))}
        </div>
      </div>

      {/* UTM strings */}
      {brief.utm_string && (
        <div style={{ marginBottom:12 }}>
          <div style={labelStyle}>UTM Strings</div>
          {typeof brief.utm_string === 'object' ? Object.entries(brief.utm_string).map(([pl, utm]) => (
            <div key={pl} style={{ fontSize:10, fontFamily:'monospace', background:'var(--navy)', color:'var(--green)', padding:'4px 8px', borderRadius:4, marginBottom:4, wordBreak:'break-all' }}>
              <span style={{ color:'var(--muted)', marginRight:4 }}>{platformLabels[pl]}:</span>{utm}
            </div>
          )) : <div style={{ fontSize:10, fontFamily:'monospace', background:'var(--navy)', color:'var(--green)', padding:'4px 8px', borderRadius:4, wordBreak:'break-all' }}>{brief.utm_string}</div>}
        </div>
      )}

      {/* TinyURL */}
      <div style={{ marginBottom:12 }}>
        <div style={labelStyle}>TinyURL</div>
        <div style={{ display:'flex', gap:6 }}>
          <input value={tinyInput} onChange={e => setTinyInput(e.target.value)} placeholder="Paste TinyURL here"
            style={{ flex:1, padding:'5px 8px', borderRadius:4, border:'1px solid rgba(71,130,211,0.2)', background:'var(--navy)', color:'var(--white)', fontSize:11 }} />
          <button onClick={() => onSaveTinyUrl(brief.id, tinyInput)}
            style={{ fontSize:10, fontWeight:600, color:'var(--green)', background:'rgba(151,203,0,0.1)', border:'none', borderRadius:4, padding:'5px 10px', cursor:'pointer' }}>Save</button>
        </div>
      </div>

      {/* Readiness Gates */}
      <div style={{ marginBottom:12 }}>
        <div style={labelStyle}>Readiness Gates ({gc.done}/{gc.total})</div>
        <div style={cardStyle}>
          {Object.entries(READINESS_GATE_LABELS).map(([key, label]) => {
            const checked = brief.readiness_gates?.[key] || false;
            return (
              <label key={key} style={{ display:'flex', alignItems:'center', gap:8, padding:'4px 0', cursor:'pointer', fontSize:11, color: checked ? 'var(--green)' : 'var(--muted-light)' }}>
                <input type="checkbox" checked={checked} onChange={() => onToggleGate(brief.id, key)} style={{ accentColor:'var(--green)' }} />
                {label}
              </label>
            );
          })}
        </div>
      </div>

      {/* YELLOW lane review */}
      {brief.approval_lane === 'yellow' && (
        <div style={{ marginBottom:12 }}>
          <label style={{ display:'flex', alignItems:'center', gap:8, padding:'8px 10px', background:'rgba(245,158,11,0.1)', borderRadius:4, cursor:'pointer', fontSize:11, color:'var(--amber)' }}>
            <input type="checkbox" checked={brief.reviewed_by_casey || false}
              onChange={() => { Store.update('brief_log', brief.id, { reviewed_by_casey: !brief.reviewed_by_casey }); reload(); }}
              style={{ accentColor:'var(--amber)' }} />
            Casey has reviewed (YELLOW lane)
          </label>
        </div>
      )}

      {/* Actions */}
      <div style={{ display:'flex', gap:8, marginTop:16 }}>
        {rule && (
          <button onClick={() => onAdvance(brief)}
            style={{ flex:1, background:'var(--green)', color:'var(--navy)', border:'none', borderRadius:4, padding:'8px 14px', fontSize:11, fontWeight:700, fontFamily:'var(--font-display)', cursor:'pointer' }}>
            Move to {KANBAN_COLUMNS.find(c=>c.id===rule.next)?.label || rule.next}
          </button>
        )}
        {brief.status !== 'published' && (
          <button onClick={() => onDelete(brief.id)}
            style={{ padding:'8px 14px', background:'rgba(232,80,58,0.1)', color:'var(--red)', border:'none', borderRadius:4, fontSize:11, fontWeight:600, cursor:'pointer' }}>
            Delete
          </button>
        )}
      </div>
    </div>
  );
}

/* --- New Brief Modal --- */
function NewBriefModal({ onClose, reload, showToast }) {
  const [form, setForm] = useState({
    year:'', make:'', model:'', total_time:'', price:'', location:'',
    broker_name:'', broker_handle:'', platforms:[], content_type:'listing',
    utm_campaign:'', highlight_specs:'', op_cost:false
  });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const utmPresets = Store.get('utm_presets') || [];
  const [showNewCampaign, setShowNewCampaign] = useState(false);
  const [newCamp, setNewCamp] = useState({ name:'', id:'' });

  function togglePlatform(p) {
    setForm(f => ({ ...f, platforms: f.platforms.includes(p) ? f.platforms.filter(x=>x!==p) : [...f.platforms, p] }));
  }

  function modelSlug() {
    const m = (form.make + '_' + form.model).toLowerCase().replace(/[^a-z0-9]/g, '_').replace(/_+/g,'_');
    return m;
  }

  function utmStrings() {
    if (!form.utm_campaign || form.platforms.length === 0) return {};
    const slug = modelSlug();
    const result = {};
    form.platforms.forEach(p => { result[p] = 'utm_source=' + p + '&utm_medium=social&utm_campaign=' + form.utm_campaign + '&utm_content=' + slug; });
    return result;
  }

  function addCampaign() {
    if (!newCamp.name || !newCamp.id) return;
    const slug = newCamp.id.toLowerCase().replace(/[^a-z0-9-]/g, '-');
    const presets = Store.get('utm_presets') || [];
    presets.push({ id: generateId(), name: newCamp.name, utm_campaign: slug, active: true, created_date: new Date().toISOString() });
    Store.set('utm_presets', presets);
    logEvent('utm_campaign_created', { campaign_id: slug, campaign_name: newCamp.name });
    setForm(f => ({ ...f, utm_campaign: slug }));
    setNewCamp({ name:'', id:'' });
    setShowNewCampaign(false);
    showToast('Campaign added', 'success');
  }

  async function generate() {
    if (!form.year || !form.make || !form.model || !form.broker_name || form.platforms.length === 0) {
      setError('Fill all required fields: Year, Make, Model, Broker Name, and at least 1 platform.');
      return;
    }
    const isYellow = YELLOW_LANE_TYPES.includes(form.content_type);
    const utms = utmStrings();
    const brief = {
      id: generateId(),
      aircraft_year: form.year, aircraft_make: form.make, aircraft_model: form.model,
      total_time: form.total_time ? parseInt(form.total_time) : null,
      price: form.price ? parseInt(form.price) : null,
      location: form.location, broker_name: form.broker_name, broker_handle: form.broker_handle,
      platforms: form.platforms, content_type: form.content_type,
      content_bucket: form.content_type === 'listing' ? 'Listing' : 'Pilot-Direct',
      funnel_stage: form.content_type === 'listing' ? 'Intent' : 'Awareness',
      utm_string: utms, destination_url: '', tinyurl: null,
      created_date: new Date().toISOString(), status: 'backlog',
      approval_lane: isYellow ? 'yellow' : 'green', owner: 'keaton',
      readiness_gates: {
        copy_approved: false, image_selected: false,
        utm_created: Object.keys(utms).length > 0, tinyurl_generated: false,
        canva_linked: false, publish_time_locked: false,
        platform_confirmed: true, broker_tag_confirmed: false
      },
      info_gate_cleared: true, reviewed_by_casey: false, drive_brief_url: null
    };

    // If Apps Script URL is set, call it
    if (BRIEF_GENERATOR_URL) {
      setLoading(true);
      setError('');
      try {
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 3000);
        const resp = await fetch(BRIEF_GENERATOR_URL, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ...form, generated_by: 'hub_v1' }),
          signal: controller.signal
        });
        clearTimeout(timeout);
        const data = await resp.json();
        if (data.success) {
          brief.drive_brief_url = data.drive_url;
          brief.copy = data.brief_html;
        } else {
          setError(data.error || 'Brief generation failed.');
          setLoading(false);
          return;
        }
      } catch (e) {
        setError('Brief generation failed. Check your connection and try again. Or use the direct Brief Generator link below.');
        logEvent('brief_generation_failed', { error_type: e.name === 'AbortError' ? 'timeout' : 'network' });
        setLoading(false);
        return;
      }
      setLoading(false);
    }

    Store.push('brief_log', brief);
    Store.logActivity('brief_created', form.make + ' ' + form.model + ' (' + form.platforms.join(',') + ')');
    logEvent('brief_generated', { brief_id: brief.id, platform_count: form.platforms.length, content_type: form.content_type, aircraft_make: form.make, utms_generated: Object.keys(utms).length });
    showToast('Brief created and added to Backlog', 'success');
    reload();
    onClose();
  }

  const inputStyle = { width:'100%', padding:'6px 8px', borderRadius:4, border:'1px solid rgba(71,130,211,0.2)', background:'var(--navy)', color:'var(--white)', fontSize:11, fontFamily:'var(--font-body)' };
  const labelStyle = { fontSize:10, color:'var(--muted)', fontWeight:600, marginBottom:2, display:'block' };
  const isYellow = YELLOW_LANE_TYPES.includes(form.content_type);

  return (
    <div style={{ position:'fixed', top:0, left:0, width:'100vw', height:'100vh', background:'rgba(0,0,0,0.6)', zIndex:2000, display:'flex', alignItems:'center', justifyContent:'center' }}
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{ background:'var(--navy-light)', borderRadius:8, padding:24, width:560, maxHeight:'90vh', overflowY:'auto' }} onClick={e => e.stopPropagation()}>
        <div style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:18, color:'var(--white)', marginBottom:16 }}>New Brief</div>

        {/* Aircraft fields */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8, marginBottom:10 }}>
          <div><label style={labelStyle}>Year *</label><input value={form.year} onChange={e=>setForm({...form,year:e.target.value})} style={inputStyle} /></div>
          <div><label style={labelStyle}>Make *</label><input value={form.make} onChange={e=>setForm({...form,make:e.target.value})} style={inputStyle} /></div>
          <div><label style={labelStyle}>Model *</label><input value={form.model} onChange={e=>setForm({...form,model:e.target.value})} style={inputStyle} /></div>
        </div>
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:8, marginBottom:10 }}>
          <div><label style={labelStyle}>Total Time</label><input type="number" value={form.total_time} onChange={e=>setForm({...form,total_time:e.target.value})} style={inputStyle} /></div>
          <div><label style={labelStyle}>Price</label><input type="number" value={form.price} onChange={e=>setForm({...form,price:e.target.value})} placeholder="Leave blank = Call For Price" style={inputStyle} /></div>
          <div><label style={labelStyle}>Location</label><input value={form.location} onChange={e=>setForm({...form,location:e.target.value})} style={inputStyle} /></div>
        </div>

        {/* Broker */}
        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:10 }}>
          <div><label style={labelStyle}>Broker Name *</label><input value={form.broker_name} onChange={e=>setForm({...form,broker_name:e.target.value})} style={inputStyle} /></div>
          <div><label style={labelStyle}>Broker Social Handle</label><input value={form.broker_handle} onChange={e=>setForm({...form,broker_handle:e.target.value})} placeholder="@handle" style={inputStyle} /></div>
        </div>

        {/* Platforms */}
        <div style={{ marginBottom:10 }}>
          <label style={labelStyle}>Platforms *</label>
          <div style={{ display:'flex', gap:6 }}>
            {['linkedin','facebook','instagram','x','tiktok'].map(p => (
              <button key={p} onClick={() => togglePlatform(p)}
                style={{ fontSize:10, fontWeight:700, padding:'4px 10px', borderRadius:3, cursor:'pointer', border: form.platforms.includes(p) ? '2px solid var(--green)' : '1px solid rgba(71,130,211,0.2)',
                  background: form.platforms.includes(p) ? 'rgba(151,203,0,0.15)' : 'rgba(71,130,211,0.06)', color: form.platforms.includes(p) ? 'var(--green)' : 'var(--muted)' }}>
                {platformLabels[p]}
              </button>
            ))}
          </div>
        </div>

        {/* Content Type */}
        <div style={{ marginBottom:10 }}>
          <label style={labelStyle}>Content Type</label>
          <select value={form.content_type} onChange={e=>setForm({...form,content_type:e.target.value})} style={inputStyle}>
            {CONTENT_TYPES.map(t => <option key={t} value={t}>{t.replace(/_/g,' ')}</option>)}
          </select>
          {isYellow && (
            <div style={{ fontSize:10, color:'var(--amber)', marginTop:4, padding:'4px 8px', background:'rgba(245,158,11,0.08)', borderRadius:4 }}>
              This content type requires Casey's review (YELLOW lane). Brief will be flagged.
            </div>
          )}
        </div>

        {/* UTM Campaign */}
        <div style={{ marginBottom:10 }}>
          <label style={labelStyle}>UTM Campaign</label>
          <div style={{ display:'flex', gap:6 }}>
            <select value={form.utm_campaign} onChange={e=>setForm({...form,utm_campaign:e.target.value})} style={{ ...inputStyle, flex:1 }}>
              <option value="">Select campaign...</option>
              {utmPresets.map(p => <option key={p.id} value={p.utm_campaign}>{p.name}</option>)}
            </select>
            <button onClick={() => setShowNewCampaign(!showNewCampaign)}
              style={{ fontSize:10, fontWeight:600, color:'var(--blue)', background:'none', border:'none', cursor:'pointer', whiteSpace:'nowrap' }}>+ New</button>
          </div>
          {showNewCampaign && (
            <div style={{ display:'flex', gap:6, marginTop:6 }}>
              <input placeholder="Campaign Name" value={newCamp.name} onChange={e=>setNewCamp({...newCamp,name:e.target.value})} style={{ ...inputStyle, flex:1 }} />
              <input placeholder="campaign-slug" value={newCamp.id} onChange={e=>setNewCamp({...newCamp,id:e.target.value.toLowerCase().replace(/[^a-z0-9-]/g,'-')})} style={{ ...inputStyle, flex:1 }} />
              <button onClick={addCampaign} style={{ fontSize:10, fontWeight:600, color:'var(--green)', background:'rgba(151,203,0,0.1)', border:'none', borderRadius:4, padding:'4px 10px', cursor:'pointer' }}>Add</button>
            </div>
          )}
          {!form.utm_campaign && utmPresets.length === 0 && (
            <div style={{ fontSize:10, color:'var(--amber)', marginTop:4 }}>No UTM campaigns configured. Add one above or in Library {'>'} UTM/Links.</div>
          )}
        </div>

        {/* UTM preview */}
        {form.platforms.length > 0 && form.utm_campaign && (
          <div style={{ marginBottom:10 }}>
            <label style={labelStyle}>UTM Strings (auto-generated)</label>
            {Object.entries(utmStrings()).map(([pl, utm]) => (
              <div key={pl} style={{ fontSize:10, fontFamily:'monospace', background:'var(--navy)', color:'var(--green)', padding:'4px 8px', borderRadius:4, marginBottom:3, wordBreak:'break-all' }}>
                <span style={{ color:'var(--muted)', marginRight:4 }}>{platformLabels[pl]}:</span>{utm}
              </div>
            ))}
            <div style={{ fontSize:10, color:'var(--muted)', marginTop:2 }}>utm_content: {modelSlug()}</div>
          </div>
        )}

        {/* Highlight specs */}
        <div style={{ marginBottom:10 }}>
          <label style={labelStyle}>Highlight Specs</label>
          <textarea rows={3} value={form.highlight_specs} onChange={e=>setForm({...form,highlight_specs:e.target.value})} placeholder="3 key features (optional)" style={{ ...inputStyle, resize:'vertical' }} />
        </div>

        {/* Op-cost toggle */}
        <label style={{ display:'flex', alignItems:'center', gap:8, marginBottom:16, cursor:'pointer', fontSize:11, color:'var(--muted-light)' }}>
          <input type="checkbox" checked={form.op_cost} onChange={e=>setForm({...form,op_cost:e.target.checked})} style={{ accentColor:'var(--green)' }} />
          Include operating cost download CTA
        </label>

        {/* Error */}
        {error && <div style={{ fontSize:11, color:'#ff9080', borderLeft:'3px solid var(--red)', padding:'6px 10px', marginBottom:12, background:'rgba(232,80,58,0.06)', borderRadius:'0 4px 4px 0' }}>{error}</div>}

        {/* Submit */}
        <button onClick={generate} disabled={loading}
          style={{ width:'100%', background:'var(--green)', color:'var(--navy)', border:'none', borderRadius:4, padding:'10px', fontSize:14, fontWeight:700, fontFamily:'var(--font-display)', cursor: loading ? 'wait' : 'pointer', opacity: loading ? 0.7 : 1 }}>
          {loading ? 'Generating...' : 'Generate Brief'}
        </button>

        {BRIEF_GENERATOR_URL && (
          <a href={BRIEF_GENERATOR_URL} target="_blank" rel="noopener" style={{ display:'block', textAlign:'center', marginTop:8, fontSize:11, color:'var(--blue)' }}>
            Direct Brief Generator (fallback)
          </a>
        )}
      </div>
    </div>
  );
}

/* --- New Task Modal --- */
function NewTaskModal({ onClose, reload, showToast }) {
  const [form, setForm] = useState({ title:'', tier:'T2', tags:'', owner:'keaton', due_date:'', priority:'P1' });

  function submit() {
    if (!form.title || !form.tier) return;
    const tags = form.tags.split(',').map(t => t.trim()).filter(Boolean).map(t => t.startsWith('#') ? t.replace(/\s+/g,'-') : '#' + t.replace(/\s+/g,'-'));
    const task = {
      title: form.title, tier: form.tier, tags, owner: form.owner,
      due_date: form.due_date || new Date().toISOString(), status: 'active',
      priority: form.priority, created_date: new Date().toISOString()
    };
    Store.push('tasks', task);
    logEvent('task_created', { tier: form.tier, owner: form.owner, priority: form.priority });
    Store.logActivity('task_created', form.title);

    // mailto
    const email = TEAM_EMAILS[form.owner];
    if (email) {
      const subj = encodeURIComponent('Action assigned: ' + form.title.slice(0,50));
      const body = encodeURIComponent('Due: ' + (form.due_date || 'ASAP'));
      window.open('mailto:' + email + '?subject=' + subj + '&body=' + body, '_blank');
    }
    showToast('Task created', 'success');
    reload();
    onClose();
  }

  const inputStyle = { width:'100%', padding:'6px 8px', borderRadius:4, border:'1px solid rgba(71,130,211,0.2)', background:'var(--navy)', color:'var(--white)', fontSize:11, fontFamily:'var(--font-body)' };
  const labelStyle = { fontSize:10, color:'var(--muted)', fontWeight:600, marginBottom:2, display:'block' };

  return (
    <div style={{ position:'fixed', top:0, left:0, width:'100vw', height:'100vh', background:'rgba(0,0,0,0.6)', zIndex:2000, display:'flex', alignItems:'center', justifyContent:'center' }}
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{ background:'var(--navy-light)', borderRadius:8, padding:24, width:440, maxHeight:'90vh', overflowY:'auto' }} onClick={e => e.stopPropagation()}>
        <div style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:18, color:'var(--white)', marginBottom:16 }}>New Task</div>

        <div style={{ marginBottom:10 }}><label style={labelStyle}>Title *</label><input value={form.title} onChange={e=>setForm({...form,title:e.target.value})} style={inputStyle} /></div>

        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:10 }}>
          <div>
            <label style={labelStyle}>Tier *</label>
            <div style={{ display:'flex', gap:4 }}>
              {['T1','T2','T3'].map(t => (
                <button key={t} onClick={() => setForm({...form,tier:t})}
                  style={{ flex:1, fontSize:11, fontWeight:700, padding:'5px 0', borderRadius:3, cursor:'pointer',
                    border: form.tier===t ? '2px solid var(--green)' : '1px solid rgba(71,130,211,0.2)',
                    background: form.tier===t ? 'rgba(151,203,0,0.15)' : 'rgba(71,130,211,0.06)',
                    color: form.tier===t ? 'var(--green)' : 'var(--muted)' }}>{t}</button>
              ))}
            </div>
          </div>
          <div>
            <label style={labelStyle}>Priority</label>
            <select value={form.priority} onChange={e=>setForm({...form,priority:e.target.value})} style={inputStyle}>
              <option value="P0">P0</option><option value="P1">P1</option><option value="P2">P2</option>
            </select>
          </div>
        </div>

        <div style={{ marginBottom:10 }}><label style={labelStyle}>Tags (comma-separated)</label><input value={form.tags} onChange={e=>setForm({...form,tags:e.target.value})} placeholder="#event, #nbaa" style={inputStyle} /></div>

        <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:16 }}>
          <div>
            <label style={labelStyle}>Owner</label>
            <select value={form.owner} onChange={e=>setForm({...form,owner:e.target.value})} style={inputStyle}>
              {TEAM_ROSTER.map(m => <option key={m.key} value={m.key}>{m.name}</option>)}
            </select>
          </div>
          <div><label style={labelStyle}>Due Date</label><input type="date" value={form.due_date} onChange={e=>setForm({...form,due_date:e.target.value})} style={inputStyle} /></div>
        </div>

        <button onClick={submit}
          style={{ width:'100%', background:'var(--green)', color:'var(--navy)', border:'none', borderRadius:4, padding:'10px', fontSize:14, fontWeight:700, fontFamily:'var(--font-display)', cursor:'pointer' }}>
          Create Task
        </button>
      </div>
    </div>
  );
}

/* ============================================================
   SETTINGS VIEW
   ============================================================ */
function SettingsView() {
  const [settings, setSettings] = useState(Store.get('settings'));
  const sprint = Store.getSprintInfo();
  const usage = new Blob([localStorage.getItem(STORE_KEY) || '']).size;

  function updateSetting(path, value) {
    Store.set(`settings.${path}`, value);
    setSettings(Store.get('settings'));
  }

  function handleExport() {
    const json = JSON.stringify(Store.get(), null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `globalair_hub_backup_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function SettingRow({ label, description, children }) {
    return (
      <div style={{ marginBottom:14 }}>
        <label style={{ display:'block',fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'0.08em',color:'var(--muted)',marginBottom:4 }}>{label}</label>
        {children}
        {description && <div style={{ fontSize:10,color:'var(--muted)',marginTop:3 }}>{description}</div>}
      </div>
    );
  }

  function Toggle({ value, onChange }) {
    return (
      <button onClick={() => onChange(!value)} style={{
        width:36,height:20,borderRadius:10,border:'none',cursor:'pointer',position:'relative',
        background: value ? 'var(--green)' : 'rgba(71,130,211,0.2)',transition:'background 180ms'
      }}>
        <div style={{ width:16,height:16,borderRadius:'50%',background:'var(--white)',position:'absolute',top:2,left: value ? 18 : 2,transition:'left 180ms' }} />
      </button>
    );
  }

  return (
    <div style={{ padding:20,overflowY:'auto',height:'100%',maxWidth:700 }}>
      <div style={{ fontFamily:'var(--font-display)',fontWeight:700,fontSize:18,color:'var(--white)',marginBottom:20 }}>Settings</div>

      {/* Sprint */}
      <div style={{ background:'var(--navy-light)',border:'1px solid rgba(71,130,211,0.1)',borderRadius:8,padding:18,marginBottom:16 }}>
        <div style={{ fontFamily:'var(--font-display)',fontWeight:700,fontSize:13,color:'var(--white)',marginBottom:12 }}>Sprint Configuration</div>
        <div style={{ display:'flex',gap:24,marginBottom:12 }}>
          <div><div style={{ fontSize:9,color:'var(--muted)',textTransform:'uppercase' }}>Sprint</div><div style={{ fontFamily:'var(--font-display)',fontWeight:700,fontSize:22,color:'var(--white)' }}>{sprint.number}</div></div>
          <div><div style={{ fontSize:9,color:'var(--muted)',textTransform:'uppercase' }}>Day</div><div style={{ fontFamily:'var(--font-display)',fontWeight:700,fontSize:22,color:'var(--white)' }}>{sprint.day}</div></div>
        </div>
        <SettingRow label="Sprint Start Date">
          <input type="date" value={settings.sprint_start_date || ''} onChange={e => updateSetting('sprint_start_date', e.target.value)}
            style={{ background:'rgba(71,130,211,0.08)',border:'1px solid rgba(71,130,211,0.15)',borderRadius:4,padding:'6px 10px',fontSize:12,color:'var(--muted-light)',width:200 }} />
        </SettingRow>
      </div>

      {/* Measurement Signals */}
      <div style={{ background:'var(--navy-light)',border:'1px solid rgba(71,130,211,0.1)',borderRadius:8,padding:18,marginBottom:16 }}>
        <div style={{ fontFamily:'var(--font-display)',fontWeight:700,fontSize:13,color:'var(--white)',marginBottom:12 }}>Measurement Integrity Signals</div>
        {[
          { key: 'callrail_active', label: 'CallRail Active', desc: '20pts — phone inquiry tracking' },
          { key: 'ga4_clean_segment', label: 'GA4 Clean Segment', desc: '20pts — Email_Open_ filter confirmed' },
          { key: 'crm_utm_capture', label: 'CRM UTM Capture', desc: '15pts — gclid/UTM in CRM' },
          { key: 'avblast_retargeting', label: 'AvBlast Retargeting', desc: '15pts — email retargeting sync' }
        ].map(s => (
          <div key={s.key} style={{ display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 0',borderBottom:'1px solid rgba(71,130,211,0.04)' }}>
            <div>
              <div style={{ fontSize:12,color:'var(--muted-light)',fontWeight:500 }}>{s.label}</div>
              <div style={{ fontSize:10,color:'var(--muted)' }}>{s.desc}</div>
            </div>
            <Toggle value={settings[s.key]} onChange={v => updateSetting(s.key, v)} />
          </div>
        ))}
        <SettingRow label="NBAA SDC Booth Number" description="Set to null to trigger alert banner block">
          <input type="text" value={settings.nbaa_sdc_booth || ''} onChange={e => updateSetting('nbaa_sdc_booth', e.target.value || null)}
            placeholder="e.g., #1234"
            style={{ background:'rgba(71,130,211,0.08)',border:'1px solid rgba(71,130,211,0.15)',borderRadius:4,padding:'6px 10px',fontSize:12,color:'var(--muted-light)',width:200,marginTop:8 }} />
        </SettingRow>
      </div>

      {/* Data Management */}
      <div style={{ background:'var(--navy-light)',border:'1px solid rgba(71,130,211,0.1)',borderRadius:8,padding:18 }}>
        <div style={{ fontFamily:'var(--font-display)',fontWeight:700,fontSize:13,color:'var(--white)',marginBottom:12 }}>Data Management</div>
        <div style={{ display:'flex',gap:8,marginBottom:8 }}>
          <button onClick={handleExport} style={{ background:'rgba(71,130,211,0.1)',border:'1px solid rgba(71,130,211,0.15)',borderRadius:4,padding:'6px 14px',fontSize:11,color:'var(--muted-light)' }}>Export JSON</button>
        </div>
        <div style={{ fontSize:10,color:'var(--muted)' }}>Storage: {(usage / 1024).toFixed(1)} KB</div>
      </div>
    </div>
  );
}

/* ============================================================
   APP — Root Component
   ============================================================ */
function App() {
  const [currentView, setCurrentView] = useState(Store.get('lastModule') || 'command');
  const [navParams, setNavParams] = useState({});
  const [toast, setToast] = useState(null);
  const sprintInfo = Store.getSprintInfo();

  function navigate(viewId, params = {}) {
    setCurrentView(viewId);
    setNavParams(params);
    Store.set('lastModule', viewId);
    logEvent('navigate', { from: currentView, to: viewId, params });
  }

  function showToast(message, type = 'info') {
    setToast({ message, type, key: Date.now() });
  }

  const navContext = useMemo(() => ({ navigate, showToast, params: navParams }), [currentView, navParams]);

  function renderView() {
    switch (currentView) {
      case 'command':  return <CommandView />;
      case 'plan':     return <PlanView />;
      case 'produce':  return <ProduceView />;
      case 'channel':  return <ChannelView />;
      case 'requests': return <RequestsView />;
      case 'settings': return <SettingsView />;
      default:         return <PlaceholderView viewId={currentView} />;
    }
  }

  return (
    <NavContext.Provider value={navContext}>
      <div style={{ display:'flex',height:'100vh',width:'100vw' }}>
        {/* Sidebar */}
        <Sidebar currentView={currentView} onNavigate={navigate} />

        {/* Main content */}
        <div style={{ flex:1,display:'flex',flexDirection:'column',minWidth:0 }}>
          <Topbar currentView={currentView} sprintInfo={sprintInfo} />

          {/* Settings nav item (below main views in sidebar — adding as route only) */}
          <main style={{ flex:1,overflowY:'auto' }}>
            {renderView()}
          </main>
        </div>
      </div>

      {/* Toast */}
      {toast && <Toast key={toast.key} message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
    </NavContext.Provider>
  );
}

/* ============================================================
   MOUNT
   ============================================================ */
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
