                  style={{ background: 'rgba(71,130,211,0.08)', border: '1px solid rgba(71,130,211,0.15)', borderRadius: 4, padding: '3px 6px', fontSize: 10, color: 'var(--muted-light)', outline: 'none' }}>
                  <option value="SCALE">SCALE</option>
                  <option value="FIX">FIX</option>
                  <option value="EXPERIMENT">EXPERIMENT</option>
                </select>
                <select value={aqForm.assignee} onChange={e => setAqForm({ ...aqForm, assignee: e.target.value })}
                  style={{ background: 'rgba(71,130,211,0.08)', border: '1px solid rgba(71,130,211,0.15)', borderRadius: 4, padding: '3px 6px', fontSize: 10, color: 'var(--muted-light)', outline: 'none' }}>
                  {Object.keys(TEAM_EMAILS).map(k => <option key={k} value={k}>{k}</option>)}
                </select>
                <button onClick={addAction} disabled={!aqForm.text.trim()}
                  style={{ background: aqForm.text.trim() ? 'var(--green)' : 'rgba(71,130,211,0.08)', color: aqForm.text.trim() ? 'var(--navy-deep)' : 'var(--muted)', border: 'none', borderRadius: 4, padding: '3px 10px', fontSize: 10, fontWeight: 700 }}>Add</button>
              </div>
            </div>
          )}
          {['SCALE', 'FIX', 'EXPERIMENT'].map(cat => {
            const items = actionQueue.filter(a => a.category === cat);
            if (items.length === 0) return null;
            const catColors = { SCALE: 'var(--green)', FIX: 'var(--red)', EXPERIMENT: 'var(--blue)' };
            return (
              <div key={cat} style={{ marginBottom: 8 }}>
                <div style={{ fontSize: 8, fontWeight: 700, color: catColors[cat], textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: 3 }}>{cat}</div>
                {items.map(a => {
                  const statusColors = { not_started: 'var(--muted)', in_progress: 'var(--amber)', done: 'var(--green)' };
                  const statusLabels = { not_started: 'TODO', in_progress: 'WIP', done: 'DONE' };
                  return (
                    <div key={a.id} style={{ display: 'flex', alignItems: 'center', gap: 6, padding: '3px 0', borderBottom: '1px solid rgba(71,130,211,0.04)' }}>
                      <button onClick={() => cycleActionStatus(a.id)}
                        style={{ fontSize: 8, fontWeight: 700, padding: '1px 5px', borderRadius: 3, border: 'none', background: statusColors[a.status] + '22', color: statusColors[a.status], cursor: 'pointer', flexShrink: 0 }}>
                        {statusLabels[a.status]}
                      </button>
                      <span style={{ fontSize: 10, color: a.status === 'done' ? 'var(--muted)' : 'var(--muted-light)', flex: 1, textDecoration: a.status === 'done' ? 'line-through' : 'none', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{a.text}</span>
                      {a.assignee && (
                        <a href={'mailto:' + (TEAM_EMAILS[a.assignee] || '')} title={'Assign: ' + a.assignee}
                          style={{ fontSize: 8, color: 'var(--blue)', textDecoration: 'none' }}>{a.assignee}</a>
                      )}
                    </div>
                  );
                })}
              </div>
            );
          })}
          {actionQueue.length === 0 && !showAqForm && <div style={{ fontSize: 10, color: 'var(--muted)' }}>No actions queued. Click + to add.</div>}
        </div>

        <CompPanel />
      </div>

      <div style={cardStyle}>
        <div style={sectionTitle}>Platform Performance</div>
        <table style={{ width: '100%', borderCollapse: 'collapse' }}>
          <thead>
            <tr>
              {[
                { key: 'platform', label: 'Platform' },
                { key: 'posts', label: 'Posts' },
                { key: 'clicks', label: 'TinyURL Clicks' },
                { key: 'sessions', label: 'GA4 Sessions' },
                { key: 'estQi', label: 'Est. QI' }
              ].map(col => (
                <th key={col.key}
                  onClick={() => { if (sortCol === col.key) setSortAsc(!sortAsc); else { setSortCol(col.key); setSortAsc(true); } }}
                  style={{ textAlign: 'left', fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: sortCol === col.key ? 'var(--blue)' : 'var(--muted)', padding: '6px 10px', cursor: 'pointer', borderBottom: '1px solid rgba(71,130,211,0.1)' }}>
                  {col.label} {sortCol === col.key ? (sortAsc ? '▲' : '▼') : ''}
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {perfTableData().map(row => (
              <tr key={row.platform} style={{ borderBottom: '1px solid rgba(71,130,211,0.04)' }}>
                <td style={{ padding: '6px 10px', fontSize: 12, color: 'var(--white)', fontWeight: 500 }}>
                  <span style={{ marginRight: 6 }}>{platformMeta[row.platform].icon}</span>{row.name}
                </td>
                <td style={{ padding: '6px 10px', fontSize: 12, color: 'var(--muted-light)' }}>{row.posts}</td>
                <td style={{ padding: '6px 10px', fontSize: 12, color: 'var(--muted-light)' }}>{row.clicks}</td>
                <td style={{ padding: '6px 10px' }}>
                  <span style={{ fontSize: 8, fontWeight: 700, padding: '1px 5px', borderRadius: 3, background: 'rgba(138,146,168,0.15)', color: 'var(--muted)' }}>PENDING</span>
                </td>
                <td style={{ padding: '6px 10px' }}>
                  <span style={{ fontSize: 8, fontWeight: 700, padding: '1px 5px', borderRadius: 3, background: 'rgba(138,146,168,0.15)', color: 'var(--muted)' }}>PENDING</span>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {manualModal && (
        <div onClick={e => { if (e.target === e.currentTarget) setManualModal(null); }}
          style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.6)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000 }}>
          <div style={{ background: 'var(--navy-light)', border: '1px solid rgba(71,130,211,0.15)', borderRadius: 8, padding: 24, minWidth: 360 }}
            onClick={e => e.stopPropagation()}>
            <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 16, color: 'var(--white)', marginBottom: 16 }}>
              Manual Entry: {platformMeta[manualModal]?.name}
            </div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ ...labelStyle, marginBottom: 4 }}>Followers</div>
              <input value={manualForm.followers} onChange={e => setManualForm({ ...manualForm, followers: e.target.value })} style={inputStyle} placeholder="e.g., 12,400" />
            </div>
            <div style={{ marginBottom: 12 }}>
              <div style={{ ...labelStyle, marginBottom: 4 }}>Engagement %</div>
              <input value={manualForm.engagement} onChange={e => setManualForm({ ...manualForm, engagement: e.target.value })} style={inputStyle} placeholder="e.g., 3.2%" />
            </div>
            <div style={{ marginBottom: 16 }}>
              <div style={{ ...labelStyle, marginBottom: 4 }}>Clicks / Views</div>
              <input value={manualForm.clicks} onChange={e => setManualForm({ ...manualForm, clicks: e.target.value })} style={inputStyle} placeholder="e.g., 840" />
            </div>
            <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
              <button onClick={() => setManualModal(null)}
                style={{ background: 'rgba(71,130,211,0.1)', border: '1px solid rgba(71,130,211,0.2)', borderRadius: 4, padding: '6px 14px', fontSize: 12, color: 'var(--muted-light)' }}>Cancel</button>
              <button onClick={saveManualEntry}
                style={{ background: 'var(--green)', border: 'none', borderRadius: 4, padding: '6px 14px', fontSize: 12, fontWeight: 700, color: 'var(--navy-deep)' }}>Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================================
   PLAN VIEW (Page 2)
   ============================================================ */
function PlanView() {
  const nav = useNav();
  const [currentDate, setCurrentDate] = useState(new Date());
  const [selectedBrief, setSelectedBrief] = useState(null);
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [filters, setFilters] = useState({ platform: 'all', bucket: 'all', category: 'all', stage: 'all', owner: 'all', lane: 'all' });
  const [savedViews, setSavedViews] = useState(() => {
    try { return JSON.parse(localStorage.getItem('plan_saved_views') || '[]'); } catch(e) { return []; }
  });
  const [savedViewName, setSavedViewName] = useState('');
  const [showSaveInput, setShowSaveInput] = useState(false);
  const [tick, setTick] = useState(0);

  const cardStyle = { background: 'var(--navy-light)', border: '1px solid rgba(71,130,211,0.1)', borderRadius: 6, padding: 14 };
  const sectionTitle = { fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 13, color: 'var(--white)', marginBottom: 10 };
  const labelStyle = { fontSize: 9, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.08em', color: 'var(--muted)' };

  const GATE_KEYS = ['utm_created', 'landing_page_confirmed', 'creative_asset_attached', 'presented_by_confirmed', 'tinyurl_generated', 'copy_reviewed', 'owner_assigned', 'publish_time_locked'];
  const GATE_LABELS = { utm_created: 'UTM Created', landing_page_confirmed: 'Landing Page Confirmed', creative_asset_attached: 'Creative Asset Attached', presented_by_confirmed: 'Presented By Confirmed', tinyurl_generated: 'TinyURL Generated', copy_reviewed: 'Copy Reviewed', owner_assigned: 'Owner Assigned', publish_time_locked: 'Publish Time Locked' };
  const PLAT_COLORS = { linkedin: 'var(--pl-linkedin)', facebook: 'var(--pl-facebook)', instagram: 'var(--pl-instagram)', x: 'var(--pl-x)', tiktok: 'var(--pl-tiktok)' };
  const FILTER_OPTIONS = {
    platform: ['all', 'linkedin', 'facebook', 'instagram', 'x', 'tiktok'],
    bucket: ['all', 'market_trends', 'education', 'ownership', 'broker', 'event', 'inventory'],
    category: ['all', 'jet', 'turboprop', 'piston', 'helicopter'],
    stage: ['all', 'awareness', 'consideration', 'intent', 'conversion'],
    owner: ['all', 'casey', 'keaton', 'sydney', 'jadda', 'abby'],
    lane: ['all', 'green', 'yellow']
  };
  const RECURRING = [
    { id: 'fbo_month', label: 'FBO of the Month', owner: 'abby' },
    { id: 'ramp_ramble', label: 'Ramp Ramble', owner: 'abby' },
    { id: 'brokernet_stats', label: 'BrokerNet Stats', owner: 'keaton' },
    { id: 'fuel_map', label: 'Fuel Price Map', owner: 'keaton' },
    { id: 'game_winner', label: 'Game Winner', owner: 'keaton' }
  ];

  function fmtDate(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function detectCat(brief) {
    const txt = ((brief.make||'') + ' ' + (brief.model||'') + ' ' + (brief.aircraft||'')).toLowerCase();
    for (const [cat, kws] of Object.entries(AIRCRAFT_CATEGORIES)) {
      for (const kw of kws) { if (txt.includes(kw.toLowerCase())) return cat; }
    }
    return 'other';
  }

  function getRecurring(yr, mo) {
    const s = Store.get('settings') || {};
    if (s.recurring_posts === false) return [];
    const dates = [];
    const first = new Date(yr, mo, 1);
    const last = new Date(yr, mo+1, 0);
    dates.push({ type: RECURRING[0], date: fmtDate(first) });
    dates.push({ type: RECURRING[3], date: fmtDate(first) });
    let thuCount = 0;
    for (let d=1; d<=last.getDate(); d++) {
      if (new Date(yr,mo,d).getDay()===4) { thuCount++; if(thuCount===4) { dates.push({type:RECURRING[1],date:fmtDate(new Date(yr,mo,d))}); break; } }
    }
    let lbd = new Date(last);
    while (lbd.getDay()===0||lbd.getDay()===6) lbd.setDate(lbd.getDate()-1);
    dates.push({ type: RECURRING[2], date: fmtDate(lbd) });
    dates.push({ type: RECURRING[4], date: fmtDate(last) });
    return dates;
  }

  // Seed plan briefs on mount
  useEffect(() => {
    const bl = Store.get('brief_log') || [];
    if (!bl.some(b => b.target_date)) {
      const now = new Date(), y = now.getFullYear(), m = now.getMonth();
      const seeds = [
        { id:'plan-s1', aircraft:'2019 Citation CJ4', make:'Citation', model:'CJ4', platform:'linkedin', broker:'JetAviva', status:'published', lane:'green', target_date:fmtDate(new Date(y,m,3)), owner:'keaton', bucket:'inventory', stage:'intent', utm:'utm_source=linkedin&utm_medium=social&utm_campaign=cj4', gates:{utm_created:true,landing_page_confirmed:true,creative_asset_attached:true,presented_by_confirmed:true,tinyurl_generated:true,copy_reviewed:true,owner_assigned:true,publish_time_locked:true}, copy:'Mission-ready CJ4. Presented by JetAviva.' },
        { id:'plan-s2', aircraft:'2021 Pilatus PC-12 NGX', make:'Pilatus', model:'PC-12', platform:'facebook', broker:'Lone Mountain', status:'published', lane:'green', target_date:fmtDate(new Date(y,m,7)), owner:'keaton', bucket:'inventory', stage:'consideration', utm:'utm_source=facebook&utm_medium=social&utm_campaign=pc12', gates:{utm_created:true,landing_page_confirmed:true,creative_asset_attached:true,presented_by_confirmed:true,tinyurl_generated:true,copy_reviewed:true,owner_assigned:true,publish_time_locked:true}, copy:'Versatile turboprop. Presented by Lone Mountain.' },
        { id:'plan-s3', aircraft:'2015 Gulfstream G280', make:'Gulfstream', model:'G280', platform:'linkedin', broker:'Avpro Inc', status:'published', lane:'green', target_date:fmtDate(new Date(y,m,10)), owner:'casey', bucket:'inventory', stage:'intent', utm:'utm_source=linkedin&utm_medium=social&utm_campaign=g280', gates:{utm_created:true,landing_page_confirmed:true,creative_asset_attached:true,presented_by_confirmed:true,tinyurl_generated:true,copy_reviewed:true,owner_assigned:true,publish_time_locked:true}, copy:'Super-mid with transcontinental range. Presented by Avpro.' },
        { id:'plan-s4', aircraft:'2018 Cessna 182T', make:'Cessna', model:'182T', platform:'facebook', broker:'Midwest Aircraft', status:'scheduled', lane:'green', target_date:fmtDate(new Date(y,m,14)), owner:'keaton', bucket:'inventory', stage:'awareness', utm:'utm_source=facebook&utm_medium=social', gates:{utm_created:true,landing_page_confirmed:true,creative_asset_attached:true,presented_by_confirmed:true,tinyurl_generated:true,copy_reviewed:true,owner_assigned:true,publish_time_locked:false}, copy:'Glass panel Skylane. Presented by Midwest Aircraft.' },
        { id:'plan-s5', aircraft:'2020 Bell 505', make:'Bell', model:'505', platform:'instagram', broker:'Rotorcraft Leasing', status:'scheduled', lane:'green', target_date:fmtDate(new Date(y,m,18)), owner:'keaton', bucket:'inventory', stage:'consideration', utm:'utm_source=instagram&utm_medium=social', gates:{utm_created:true,landing_page_confirmed:true,creative_asset_attached:true,presented_by_confirmed:false,tinyurl_generated:true,copy_reviewed:true,owner_assigned:true,publish_time_locked:false}, copy:'Turbine helicopter. Presented by Rotorcraft Leasing.' },
        { id:'plan-s6', aircraft:'2017 Cirrus SR22T', make:'Cirrus', model:'SR22T', platform:'x', broker:'Cirrus Aircraft', status:'draft', lane:'green', target_date:fmtDate(new Date(y,m,20)), owner:'casey', bucket:'inventory', stage:'awareness', utm:'', gates:{utm_created:false,landing_page_confirmed:true,creative_asset_attached:true,presented_by_confirmed:true,tinyurl_generated:false,copy_reviewed:false,owner_assigned:true,publish_time_locked:false}, copy:'Turbo piston with CAPS. Presented by Cirrus.' },
        { id:'plan-s7', aircraft:'2022 King Air 350i', make:'King Air', model:'350i', platform:'linkedin', broker:'Textron', status:'draft', lane:'green', target_date:fmtDate(new Date(y,m,24)), owner:'sydney', bucket:'market_trends', stage:'consideration', utm:'', gates:{utm_created:false,landing_page_confirmed:false,creative_asset_attached:true,presented_by_confirmed:true,tinyurl_generated:false,copy_reviewed:false,owner_assigned:true,publish_time_locked:false}, copy:'Twin turboprop workhorse. Presented by Textron.' },
        { id:'plan-s8', aircraft:'2016 Phenom 300', make:'Phenom', model:'300', platform:'facebook', broker:'Guardian Jet', status:'draft', lane:'yellow', target_date:fmtDate(new Date(y,m,22)), owner:'keaton', bucket:'inventory', stage:'intent', utm:'utm_source=facebook', gates:{utm_created:true,landing_page_confirmed:true,creative_asset_attached:true,presented_by_confirmed:false,tinyurl_generated:false,copy_reviewed:false,owner_assigned:true,publish_time_locked:false}, copy:'Light jet leader. Presented by Guardian Jet.' }
      ];
      const existing = new Set((Store.get('brief_log')||[]).map(b=>b.id));
      seeds.forEach(s => { if (!existing.has(s.id)) Store.push('brief_log', s); });
    }
    logEvent('plan_view_loaded', {});
  }, []);

  // Read data
  const allBriefs = (Store.get('brief_log') || []).filter(b => b.target_date);
  const year = currentDate.getFullYear(), month = currentDate.getMonth();
  const monthName = currentDate.toLocaleString('default', { month: 'long' });
  const todayStr = fmtDate(new Date());
  const recurring = getRecurring(year, month);

  // Filter
  const filtered = allBriefs.filter(b => {
    if (filters.platform !== 'all' && b.platform !== filters.platform) return false;
    if (filters.bucket !== 'all' && b.bucket !== filters.bucket) return false;
    if (filters.category !== 'all' && detectCat(b) !== filters.category) return false;
    if (filters.stage !== 'all' && b.stage !== filters.stage) return false;
    if (filters.owner !== 'all' && b.owner !== filters.owner) return false;
    if (filters.lane !== 'all' && b.lane !== filters.lane) return false;
    return true;
  });

  // Group by date
  const byDate = {};
  filtered.forEach(b => { if (!byDate[b.target_date]) byDate[b.target_date]=[]; byDate[b.target_date].push(b); });

  // Calendar cells
  const firstOfMonth = new Date(year, month, 1);
  const lastOfMonth = new Date(year, month+1, 0);
  const startPad = (firstOfMonth.getDay()+6) % 7;
  const cells = [];
  const prevLast = new Date(year, month, 0);
  for (let i = startPad-1; i >= 0; i--) { const d = prevLast.getDate()-i; const dt = new Date(year,month-1,d); cells.push({date:dt, ds:fmtDate(dt), inMonth:false, day:d}); }
  for (let d = 1; d <= lastOfMonth.getDate(); d++) { const dt = new Date(year,month,d); cells.push({date:dt, ds:fmtDate(dt), inMonth:true, day:d}); }
  const rem = 7 - (cells.length % 7); if (rem < 7) for (let d=1; d<=rem; d++) { const dt = new Date(year,month+1,d); cells.push({date:dt, ds:fmtDate(dt), inMonth:false, day:d}); }

  // Capacity
  const monthBriefs = allBriefs.filter(b => { const d = b.target_date; return d && d.startsWith(year+'-'+String(month+1).padStart(2,'0')); });
  const total = monthBriefs.length || 1;
  const pilotDirect = monthBriefs.filter(b => b.bucket === 'inventory' || b.stage === 'intent').length;
  const pdPct = Math.round((pilotDirect/total)*100);
  const platCounts = {}; monthBriefs.forEach(b => { platCounts[b.platform] = (platCounts[b.platform]||0)+1; });
  const catCounts = {jet:0,turboprop:0,piston:0,helicopter:0}; monthBriefs.forEach(b => { const c = detectCat(b); if(catCounts[c]!==undefined) catCounts[c]++; });
  const yellowBriefs = monthBriefs.filter(b => b.lane === 'yellow');

  function gateCount(gates) { return GATE_KEYS.filter(k => gates && gates[k]).length; }
  function hasActive() { return Object.values(filters).some(v => v !== 'all'); }

  function openDrawer(brief, isRec) { setSelectedBrief({...brief, _rec: isRec}); setDrawerOpen(true); logEvent(isRec ? 'recurring_post_pill_clicked' : 'calendar_pill_clicked', { id: brief.id || brief.type?.id }); }
  function closeDrawer() { setDrawerOpen(false); setSelectedBrief(null); }
  useEffect(() => { function h(e) { if(e.key==='Escape'&&drawerOpen) closeDrawer(); } document.addEventListener('keydown',h); return ()=>document.removeEventListener('keydown',h); }, [drawerOpen]);

  function toggleGate(id, gk) {
    const bl = Store.get('brief_log') || [];
    const b = bl.find(x => x.id === id);
    if (!b || b.status === 'published') return;
    const gates = {...(b.gates||{})}; gates[gk] = !gates[gk];
    Store.update('brief_log', id, { gates });
    logEvent('readiness_gate_checked', { id, gate: gk });
    if (GATE_KEYS.filter(k => gates[k]).length === 8) { logEvent('post_ready_to_schedule', { id }); nav.showToast('All gates cleared — ready to schedule', 'success'); }
    setSelectedBrief(prev => prev ? {...prev, gates} : prev);
    setTick(t => t+1);
  }

  function markReviewed(id) {
    Store.update('brief_log', id, { lane: 'green' });
    logEvent('yellow_lane_reviewed', { id });
    nav.showToast('Moved to GREEN lane', 'success');
    setSelectedBrief(prev => prev ? {...prev, lane: 'green'} : prev);
    setTick(t => t+1);
  }

  function setFilter(k, v) { setFilters(prev => ({...prev, [k]: v})); logEvent('filter_applied', {key:k,value:v}); }
  function clearAll() { setFilters({platform:'all',bucket:'all',category:'all',stage:'all',owner:'all',lane:'all'}); }
  function saveView() {
    if (!savedViewName.trim()) return;
    if (savedViews.length >= 5) { nav.showToast('Max 5 saved views', 'warning'); return; }
    const nv = [...savedViews, {name:savedViewName.trim(), filters:{...filters}}];
    setSavedViews(nv); localStorage.setItem('plan_saved_views', JSON.stringify(nv));
    setSavedViewName(''); setShowSaveInput(false); nav.showToast('View saved', 'success');
  }
  function loadView(i) { if(savedViews[i]) { setFilters(savedViews[i].filters); logEvent('saved_view_loaded',{name:savedViews[i].name}); } }
  function deleteView(i) { const nv=savedViews.filter((_,j)=>j!==i); setSavedViews(nv); localStorage.setItem('plan_saved_views',JSON.stringify(nv)); }

  function prevMonth() { setCurrentDate(new Date(year,month-1,1)); logEvent('calendar_month_changed',{direction:'prev'}); }
  function nextMonth() { setCurrentDate(new Date(year,month+1,1)); logEvent('calendar_month_changed',{direction:'next'}); }
  function goToday() { setCurrentDate(new Date()); }

  const badge = (b) => {
    const gc = gateCount(b.gates);
    if (b.status==='published') return {label:'PUBLISHED',bg:'rgba(151,203,0,0.15)',color:'var(--green)'};
    if (gc===8) return {label:'READY',bg:'rgba(151,203,0,0.15)',color:'var(--green)'};
    return {label: gc+'/8 GATES',bg:'rgba(232,80,58,0.1)',color:'#ff7060'};
  };

  // SVG gauge for pilot-direct
  function PdGauge() {
    const r=38, circ=2*Math.PI*r, off=circ-(pdPct/100)*circ;
    const clr = pdPct>=50&&pdPct<=60 ? 'var(--green)' : 'var(--amber)';
    return (
      <svg width="90" height="90" style={{display:'block',margin:'0 auto'}}>
        <circle cx="45" cy="45" r={r} fill="none" stroke="rgba(255,255,255,0.08)" strokeWidth="7"/>
        <circle cx="45" cy="45" r={r} fill="none" stroke={clr} strokeWidth="7" strokeDasharray={circ} strokeDashoffset={off} strokeLinecap="round" transform="rotate(-90 45 45)"/>
        <text x="45" y="42" textAnchor="middle" fill="var(--white)" fontFamily="var(--font-display)" fontWeight="700" fontSize="18">{pdPct}%</text>
        <text x="45" y="56" textAnchor="middle" fill="var(--muted)" fontSize="7">TARGET 50-60%</text>
      </svg>
    );
  }

  return (
    <div style={{display:'flex',height:'100%',position:'relative'}}>
      {/* Main */}
      <div style={{flex:1,overflowY:'auto',padding:'16px 16px 16px 16px',marginRight:240}}>

        {/* Filter bar */}
        <div style={{...cardStyle,marginBottom:10,display:'flex',flexWrap:'wrap',alignItems:'center',gap:6}}>
          {Object.entries(FILTER_OPTIONS).map(([key, opts]) => (
            <select key={key} value={filters[key]} onChange={e => setFilter(key, e.target.value)}
              style={{background:'var(--navy-deep)',color:'var(--muted-light)',border:'1px solid rgba(71,130,211,0.2)',borderRadius:4,padding:'4px 6px',fontSize:10,fontFamily:'var(--font-body)'}}>
              {opts.map(o => <option key={o} value={o}>{o==='all' ? key.charAt(0).toUpperCase()+key.slice(1)+': All' : o.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase())}</option>)}
            </select>
          ))}
          {hasActive() && <span onClick={clearAll} style={{fontSize:10,color:'var(--blue)',cursor:'pointer',textDecoration:'underline'}}>Clear all</span>}
          <span style={{flex:1}}/>
          {savedViews.length > 0 && (
            <select onChange={e => {if(e.target.value!=='') loadView(+e.target.value); e.target.value='';}}
              style={{background:'var(--navy-deep)',color:'var(--muted)',border:'1px solid rgba(71,130,211,0.2)',borderRadius:4,padding:'4px 6px',fontSize:10}}>
              <option value="">Saved Views</option>
              {savedViews.map((v,i) => <option key={i} value={i}>{v.name}</option>)}
            </select>
          )}
          {showSaveInput ? (
            <Fragment>
              <input value={savedViewName} onChange={e=>setSavedViewName(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')saveView();}}
                placeholder="View name..." style={{background:'var(--navy-deep)',color:'var(--white)',border:'1px solid var(--blue)',borderRadius:4,padding:'4px 6px',fontSize:10,width:90}}/>
              <button onClick={saveView} style={{background:'var(--green)',color:'var(--navy-deep)',border:'none',borderRadius:4,padding:'4px 8px',fontSize:9,fontWeight:700,cursor:'pointer'}}>Save</button>
              <button onClick={()=>setShowSaveInput(false)} style={{background:'transparent',color:'var(--muted)',border:'none',fontSize:9,cursor:'pointer'}}>Cancel</button>
            </Fragment>
          ) : (
            <button onClick={()=>setShowSaveInput(true)} style={{background:'transparent',color:'var(--blue)',border:'1px solid var(--blue)',borderRadius:4,padding:'4px 8px',fontSize:9,fontWeight:600,cursor:'pointer'}}>Save View</button>
          )}
        </div>

        {/* Active chips */}
        {hasActive() && (
          <div style={{display:'flex',gap:4,marginBottom:8,flexWrap:'wrap'}}>
            {Object.entries(filters).filter(([_,v])=>v!=='all').map(([k,v]) => (
              <span key={k} style={{background:'rgba(71,130,211,0.15)',color:'var(--blue)',fontSize:9,padding:'2px 8px',borderRadius:10,display:'inline-flex',alignItems:'center',gap:3}}>
                {v.replace(/_/g,' ')}
                <span onClick={()=>setFilter(k,'all')} style={{cursor:'pointer',color:'var(--muted)',fontWeight:700}}>×</span>
              </span>
            ))}
          </div>
        )}

        {/* Calendar header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <button onClick={prevMonth} style={{background:'var(--navy-light)',color:'var(--white)',border:'1px solid rgba(71,130,211,0.15)',borderRadius:4,padding:'4px 10px',cursor:'pointer',fontSize:14}}>◀</button>
            <span style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:18,color:'var(--white)'}}>{monthName} {year}</span>
            <button onClick={nextMonth} style={{background:'var(--navy-light)',color:'var(--white)',border:'1px solid rgba(71,130,211,0.15)',borderRadius:4,padding:'4px 10px',cursor:'pointer',fontSize:14}}>▶</button>
          </div>
          <div style={{display:'flex',gap:6}}>
            <button onClick={goToday} style={{background:'var(--green)',color:'var(--navy-deep)',border:'none',borderRadius:4,padding:'5px 12px',fontSize:10,fontWeight:700,cursor:'pointer'}}>Today</button>
            <button onClick={()=>{logEvent('new_post_shortcut_clicked',{}); nav.navigate('produce',{open_modal:'new_brief'});}}
              style={{background:'var(--blue)',color:'var(--white)',border:'none',borderRadius:4,padding:'5px 12px',fontSize:10,fontWeight:700,cursor:'pointer'}}>+ New Post</button>
          </div>
        </div>

        {/* Day headers */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:1,marginBottom:1}}>
          {['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].map(d => (
            <div key={d} style={{...labelStyle,textAlign:'center',padding:'6px 0'}}>{d}</div>
          ))}
        </div>

        {/* Calendar grid */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:1}}>
          {cells.map((cell, idx) => {
            const isToday = cell.ds === todayStr;
            const cb = byDate[cell.ds] || [];
            const cr = recurring.filter(r => r.date === cell.ds);
            const allItems = [...cr.map(r=>({_rec:true,...r})), ...cb];
            const maxShow = 4, overflow = allItems.length > maxShow ? allItems.length - maxShow : 0;

            return (
              <div key={idx} onClick={() => { if(cell.inMonth && cb.length===0 && cr.length===0) { logEvent('new_post_shortcut_clicked',{date:cell.ds}); nav.navigate('produce',{open_modal:'new_brief',target_date:cell.ds}); } }}
                style={{
                  background: isToday ? 'rgba(151,203,0,0.04)' : cell.inMonth ? 'var(--navy-light)' : 'var(--navy-deep)',
                  border: isToday ? '1px solid rgba(151,203,0,0.25)' : '1px solid rgba(71,130,211,0.06)',
                  borderRadius:4, minHeight:90, padding:'4px 5px', position:'relative',
                  cursor: (cb.length===0 && cr.length===0 && cell.inMonth) ? 'pointer' : 'default',
                  opacity: cell.inMonth ? 1 : 0.35
                }}>
                <div style={{textAlign:'right',fontSize:11,fontWeight:isToday?700:500,color:isToday?'var(--green)':'var(--muted)',marginBottom:3}}>{cell.day}</div>
                {allItems.slice(0, maxShow).map((item, i) => {
                  if (item._rec) {
                    return (
                      <div key={'r'+i} onClick={e=>{e.stopPropagation(); openDrawer(item,true);}}
                        style={{background:'rgba(138,146,168,0.2)',color:'var(--muted)',fontSize:8,padding:'2px 4px',borderRadius:3,marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',cursor:'pointer'}}>
                        🔒 {item.type.label}
                      </div>
                    );
                  }
                  const pc = PLAT_COLORS[item.platform] || 'var(--muted)';
                  const isYellow = item.lane === 'yellow';
                  return (
                    <div key={item.id} onClick={e=>{e.stopPropagation(); openDrawer(item,false);}}
                      style={{background:pc,color:'var(--white)',fontSize:8,padding:'2px 4px',borderRadius:3,marginBottom:2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',cursor:'pointer',fontWeight:600,borderLeft:isYellow?'3px solid var(--amber)':'none'}}>
                      {(item.aircraft||item.id).substring(0,22)}
                    </div>
                  );
                })}
                {overflow > 0 && <div style={{fontSize:8,color:'var(--muted)',marginTop:1}}>+{overflow} more</div>}
              </div>
            );
          })}
        </div>
      </div>

      {/* Capacity Panel */}
      <div style={{width:240,position:'fixed',right:0,top:'var(--topbar-h)',bottom:0,background:'var(--navy-deep)',borderLeft:'1px solid rgba(71,130,211,0.1)',padding:'12px 10px',overflowY:'auto',zIndex:50}}>
        <div style={{...sectionTitle,fontSize:11}}>Capacity — {monthName}</div>

        <div style={{...cardStyle,marginBottom:8,textAlign:'center'}}>
          <div style={{...labelStyle,marginBottom:4}}>Pilot-Direct Mix</div>
          <PdGauge/>
        </div>

        <div style={{...cardStyle,marginBottom:8}}>
          <div style={{...labelStyle,marginBottom:4}}>Platform Breakdown</div>
          <div style={{display:'flex',height:12,borderRadius:3,overflow:'hidden',marginBottom:6}}>
            {Object.entries(platCounts).map(([pl,cnt]) => (
              <div key={pl} title={pl+': '+cnt} style={{width:(cnt/total*100)+'%',background:PLAT_COLORS[pl]||'var(--muted)',minWidth:cnt>0?3:0}}/>
            ))}
          </div>
          {Object.entries(platCounts).map(([pl,cnt]) => (
            <div key={pl} style={{fontSize:9,color:'var(--muted)',display:'flex',alignItems:'center',gap:4,marginBottom:2}}>
              <span style={{width:6,height:6,borderRadius:'50%',background:PLAT_COLORS[pl]||'var(--muted)'}}/>
              {pl} — {cnt}
            </div>
          ))}
        </div>

        <div style={{...cardStyle,marginBottom:8}}>
          <div style={{...labelStyle,marginBottom:4}}>Category Balance</div>
          {['jet','turboprop','piston','helicopter'].map(cat => {
            const cnt = catCounts[cat]||0;
            const mx = Math.max(1,...Object.values(catCounts));
            const colors = {jet:'var(--blue)',turboprop:'var(--amber)',piston:'var(--green)',helicopter:'var(--red)'};
            return (
              <div key={cat} style={{marginBottom:5}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                  <span style={{fontSize:9,color:'var(--muted-light)',textTransform:'capitalize'}}>{cat}</span>
                  <span style={{fontSize:9,color:'var(--white)',fontWeight:600}}>{cnt}</span>
                </div>
                <div style={{background:'rgba(255,255,255,0.06)',borderRadius:2,height:6}}>
                  <div style={{width:(cnt/mx*100)+'%',height:'100%',background:colors[cat],borderRadius:2,transition:'width 0.3s'}}/>
                </div>
              </div>
            );
          })}
        </div>

        <div style={{...cardStyle,marginBottom:8}}>
          <div style={{...labelStyle,marginBottom:4}}>Posts This Month</div>
          <div style={{fontFamily:'var(--font-display)',fontWeight:700,fontSize:24,color:'var(--white)'}}>{monthBriefs.length}</div>
        </div>

        {yellowBriefs.length > 0 && (
          <div style={{...cardStyle,borderColor:'rgba(245,158,11,0.3)',marginBottom:8}}>
            <div style={{...labelStyle,color:'var(--amber)',marginBottom:4}}>Casey Review ({yellowBriefs.length})</div>
            {yellowBriefs.map(b => (
              <div key={b.id} onClick={()=>openDrawer(b,false)} style={{fontSize:9,color:'var(--amber)',padding:'3px 0',cursor:'pointer',borderBottom:'1px solid rgba(245,158,11,0.1)'}}>
                {b.aircraft||b.id}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Drawer backdrop */}
      {drawerOpen && <div onClick={closeDrawer} style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.4)',zIndex:140}}/>}

      {/* Post Detail Drawer */}
      {drawerOpen && selectedBrief && (
        <div style={{position:'fixed',top:0,right:0,bottom:0,width:320,background:'var(--navy-deep)',borderLeft:'1px solid rgba(71,130,211,0.15)',zIndex:150,padding:'16px 14px',overflowY:'auto',boxShadow:'-4px 0 20px rgba(0,0,0,0.3)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
            <span style={{...sectionTitle,marginBottom:0}}>{selectedBrief._rec ? 'Recurring Post' : 'Post Detail'}</span>
            <button onClick={closeDrawer} style={{background:'transparent',border:'none',color:'var(--muted)',fontSize:18,cursor:'pointer'}}>×</button>
          </div>

          {selectedBrief._rec ? (
            <div style={cardStyle}>
              <div style={{fontWeight:700,color:'var(--white)',fontSize:14,marginBottom:6}}>{selectedBrief.type?.label||'Recurring'}</div>
              <div style={{fontSize:11,color:'var(--muted)'}}>Owner: {selectedBrief.type?.owner||'—'}</div>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>Date: {selectedBrief.date||'—'}</div>
              <div style={{fontSize:10,color:'var(--muted)',marginTop:8,fontStyle:'italic'}}>Recurring — locked. Edit in Settings.</div>
            </div>
          ) : (
            <div>
              {/* Yellow banner */}
              {selectedBrief.lane==='yellow' && (
                <div style={{background:'rgba(245,158,11,0.12)',border:'1px solid rgba(245,158,11,0.3)',borderRadius:4,padding:'8px 10px',marginBottom:10,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
                  <span style={{fontSize:10,color:'var(--amber)',fontWeight:600}}>YELLOW LANE</span>
                  <button onClick={()=>markReviewed(selectedBrief.id)} style={{background:'var(--amber)',color:'var(--navy-deep)',border:'none',borderRadius:4,padding:'3px 10px',fontSize:9,fontWeight:700,cursor:'pointer'}}>Mark Reviewed</button>
                </div>
              )}

              {/* Brief info */}
              <div style={{...cardStyle,marginBottom:10}}>
                <div style={{fontWeight:700,color:'var(--white)',fontSize:14,marginBottom:4}}>{selectedBrief.aircraft||'—'}</div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:6}}>
                  <span style={{background:PLAT_COLORS[selectedBrief.platform]||'var(--muted)',color:'var(--white)',fontSize:9,padding:'2px 7px',borderRadius:3,fontWeight:700,textTransform:'uppercase'}}>{selectedBrief.platform}</span>
                  <span style={{fontSize:9,color:'var(--muted-light)',textTransform:'capitalize'}}>{detectCat(selectedBrief)}</span>
                </div>
                {selectedBrief.broker && <div style={{fontSize:11,color:'var(--muted-light)',marginBottom:3}}>Broker: {selectedBrief.broker}</div>}
                {selectedBrief.owner && <div style={{fontSize:11,color:'var(--muted-light)',marginBottom:3}}>Owner: {selectedBrief.owner}</div>}
                <div style={{fontSize:11,color:'var(--muted-light)'}}>Date: {selectedBrief.target_date}</div>
                {selectedBrief.utm && <div style={{fontSize:9,color:'var(--muted)',marginTop:6,wordBreak:'break-all',background:'rgba(0,0,0,0.15)',padding:'4px 6px',borderRadius:3}}>{selectedBrief.utm}</div>}
              </div>

              {/* Status */}
              {(() => { const b = badge(selectedBrief); return (
                <div style={{marginBottom:10}}>
                  <span style={{background:b.bg,color:b.color,fontSize:9,fontWeight:700,padding:'3px 10px',borderRadius:3,letterSpacing:'0.05em'}}>{b.label}</span>
                </div>
              ); })()}

              {/* Gates */}
              <div style={{...cardStyle,marginBottom:10}}>
                <div style={{...labelStyle,marginBottom:6}}>Readiness Gates — {gateCount(selectedBrief.gates)}/8</div>
                <div style={{background:'rgba(255,255,255,0.06)',borderRadius:3,height:5,marginBottom:8}}>
                  <div style={{width:(gateCount(selectedBrief.gates)/8*100)+'%',height:'100%',background:gateCount(selectedBrief.gates)===8?'var(--green)':'var(--blue)',borderRadius:3,transition:'width 0.3s'}}/>
                </div>
                {GATE_KEYS.map(gk => {
                  const checked = selectedBrief.gates && selectedBrief.gates[gk];
                  const isPub = selectedBrief.status === 'published';
                  return (
                    <label key={gk} style={{display:'flex',alignItems:'center',gap:8,padding:'3px 0',cursor:isPub?'default':'pointer',opacity:isPub?0.7:1}}>
                      <input type="checkbox" checked={!!checked} disabled={isPub} onChange={()=>toggleGate(selectedBrief.id,gk)} style={{accentColor:'var(--green)'}}/>
                      <span style={{fontSize:10,color:checked?'var(--green)':'var(--muted-light)'}}>{GATE_LABELS[gk]}</span>
                    </label>
                  );
                })}
              </div>

              {/* Copy */}
              {selectedBrief.copy && (
                <div style={{...cardStyle,marginBottom:10}}>
                  <div style={{...labelStyle,marginBottom:4}}>Copy Preview</div>
                  <div style={{fontSize:11,color:'var(--muted-light)',lineHeight:'1.5'}}>{selectedBrief.copy}</div>
                </div>
              )}

              {/* Go to Produce */}
              <button onClick={()=>{closeDrawer(); nav.navigate('produce',{brief_id:selectedBrief.id});}}
                style={{background:'var(--blue)',color:'var(--white)',border:'none',borderRadius:4,padding:'8px 14px',fontSize:11,fontWeight:600,cursor:'pointer',width:'100%',fontFamily:'var(--font-display)'}}>
                Go to Brief in Produce
              </button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function ProduceView() {
  const nav = useNav();
  const [subTab, setSubTab] = useState('pipeline');
  const [briefs, setBriefs] = useState([]);
  const [tasks, setTasks] = useState([]);
  const [experiments, setExperiments] = useState([]);
  const [deliverables, setDeliverables] = useState([]);
  const [expandedBrief, setExpandedBrief] = useState(null);
  const [showNewBrief, setShowNewBrief] = useState(false);
  const [showNewTask, setShowNewTask] = useState(false);
  const [tierFilter, setTierFilter] = useState('all');
  const [refresh, setRefresh] = useState(0);

  // Normalize briefs from Plan View schema to Produce schema
  function normalizeBrief(b) {
    if (b.aircraft_make) return b; // already Produce schema
    return {
      ...b,
      aircraft_year: b.aircraft ? b.aircraft.split(' ')[0] : '',
      aircraft_make: b.make || (b.aircraft ? b.aircraft.split(' ').slice(1,-1).join(' ') : ''),
      aircraft_model: b.model || (b.aircraft ? b.aircraft.split(' ').slice(-1)[0] : ''),
      broker_name: b.broker || '', broker_handle: '',
      platforms: b.platform ? [b.platform] : [],
      content_type: b.bucket || 'listing',
      utm_string: b.utm ? { [b.platform||'unknown']: b.utm } : {},
      created_date: b.createdAt || b.target_date || new Date().toISOString(),
      approval_lane: b.lane || 'green',
      readiness_gates: b.gates || { copy_approved:false, image_selected:false, utm_created:false, tinyurl_generated:false, canva_linked:false, publish_time_locked:false, platform_confirmed:false, broker_tag_confirmed:false },
      info_gate_cleared: b.info_gate_cleared !== undefined ? b.info_gate_cleared : true,
      reviewed_by_casey: b.reviewed_by_casey || false,
      total_time: b.total_time || null, price: b.price || null, location: b.location || '',
      destination_url: b.destination_url || '', tinyurl: b.tinyurl || null,
      drive_brief_url: b.drive_brief_url || null, owner: b.owner || 'keaton',
      funnel_stage: b.stage || 'Intent', content_bucket: b.bucket || 'Listing'
    };
  }

  // Load data
  useEffect(() => {
    let bl = (Store.get('brief_log') || []).map(normalizeBrief);
    // Merge Produce seed briefs if they don't exist
    const hasProduceSeeds = bl.some(b => b.id && b.id.startsWith('seed-brief'));
    if (!hasProduceSeeds) { bl = [...bl, ...PRODUCE_SEED_BRIEFS]; Store.set('brief_log', bl); }
    setBriefs(bl);

    let tk = Store.get('tasks') || [];
    if (tk.length === 0) { tk = PRODUCE_SEED_TASKS; Store.set('tasks', tk); }
    setTasks(tk);

    let ex = Store.get('experiments') || [];
    if (ex.length === 0) { ex = PRODUCE_SEED_EXPERIMENTS; Store.set('experiments', ex); }
    setExperiments(ex);

    let dl = Store.get('deliverables') || [];
    if (dl.length === 0) { dl = PRODUCE_SEED_DELIVERABLES; Store.set('deliverables', dl); }
    setDeliverables(dl);
  }, [refresh]);

  // Navigate param: open specific brief
  useEffect(() => {
    if (nav.params?.brief_id) {
      const b = briefs.find(x => x.id === nav.params.brief_id);
      if (b) { setSubTab('pipeline'); setExpandedBrief(b); }
    }
  }, [nav.params, briefs]);

  function reload() { setRefresh(r => r + 1); }

  const platformColors = { linkedin:'#0A66C2', facebook:'#7B68EE', instagram:'#E1306C', x:'#888', tiktok:'#69C9D0', youtube:'#FF0000' };
  const platformLabels = { linkedin:'LI', facebook:'FB', instagram:'IG', x:'X', tiktok:'TT', youtube:'YT' };

  function briefAge(b) { return ((Date.now() - new Date(b.created_date).getTime()) / 86400000).toFixed(1); }
  function gateCount(b) { if (!b.readiness_gates) return { done:0, total:8 }; const vals = Object.values(b.readiness_gates); return { done: vals.filter(Boolean).length, total: vals.length }; }

  function advanceBrief(brief) {
    const rule = STATUS_ADVANCE_RULES[brief.status];
    if (!rule) return;
    if (rule.gate === 'all_8_gates_true') {
      const g = gateCount(brief);
      if (g.done < g.total) { nav.showToast('All 8 readiness gates must be checked first', 'error'); return; }
    }
    if (rule.gate === 'yellow_reviewed_if_yellow' && brief.approval_lane === 'yellow' && !brief.reviewed_by_casey) {
      nav.showToast('YELLOW lane — Casey review required before scheduling', 'error'); return;
    }
    logEvent('brief_card_status_advanced', { brief_id: brief.id, from_status: brief.status, to_status: rule.next, platform: brief.platforms?.[0], aircraft_make: brief.aircraft_make });
    Store.update('brief_log', brief.id, { status: rule.next });
    Store.logActivity('brief_advanced', brief.aircraft_make + ' ' + brief.aircraft_model + ' → ' + rule.next);
    nav.showToast('Brief moved to ' + KANBAN_COLUMNS.find(c=>c.id===rule.next)?.label, 'success');
    reload();
  }

  function toggleGate(briefId, gate) {
    const bl = Store.get('brief_log');
    const b = bl.find(x => x.id === briefId);
    if (!b) return;
    b.readiness_gates[gate] = !b.readiness_gates[gate];
    Store.set('brief_log', bl);
    reload();
  }

  function deleteBrief(briefId) {
    Store.remove('brief_log', briefId);
    setExpandedBrief(null);
    Store.logActivity('brief_deleted', briefId);
    nav.showToast('Brief deleted', 'info');
    reload();
  }

  function saveTinyUrl(briefId, url) {
    const bl = Store.get('brief_log');
    const b = bl.find(x => x.id === briefId);
    if (!b) return;
    b.tinyurl = url;
    if (url) b.readiness_gates.tinyurl_generated = true;
    Store.set('brief_log', bl);
    reload();
  }

  // Sub-tab bar
  const tabs = [
    { id:'pipeline', label:'Pipeline' },
    { id:'blocked', label:'Blocked' },
    { id:'ops', label:'Ops Dashboard' },
    { id:'experiments', label:'Experiments' },
    { id:'deliverables', label:'Deliverables' }
  ];

  const tabStyle = (active) => ({
    background:'none', border:'none', borderBottom: active ? '2px solid var(--green)' : '2px solid transparent',
    color: active ? 'var(--white)' : 'var(--muted)', fontSize:11, fontWeight:600, padding:'8px 14px',
    cursor:'pointer', fontFamily:'var(--font-body)', transition:'all 0.15s'
  });

  const blockedBriefs = briefs.filter(b => !b.info_gate_cleared || (b.status === 'ready_to_schedule' && Object.values(b.readiness_gates || {}).some(v => !v)));

  return (
    <div style={{ padding:'16px 20px', height:'100%', display:'flex', flexDirection:'column' }}>
      {/* Header */}
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:12 }}>
        <div style={{ display:'flex', alignItems:'center', gap:16 }}>
          <div style={{ display:'flex', gap:0 }}>
            {tabs.map(t => (
              <button key={t.id} onClick={() => { setSubTab(t.id); if (t.id==='blocked') logEvent('blocked_brief_viewed',{blocked_count:blockedBriefs.length}); if (t.id==='ops') logEvent('ops_dashboard_viewed',{blocked_count:blockedBriefs.length}); }}
                style={tabStyle(subTab === t.id)}>
                {t.label}{t.id === 'blocked' && blockedBriefs.length > 0 ? ` (${blockedBriefs.length})` : ''}
              </button>
            ))}
          </div>
        </div>
        <div style={{ display:'flex', gap:8 }}>
          <button onClick={() => setShowNewBrief(true)}
            style={{ background:'var(--green)', color:'var(--navy)', border:'none', borderRadius:4, padding:'6px 14px', fontSize:11, fontWeight:700, fontFamily:'var(--font-display)', cursor:'pointer' }}>
            + New Brief
          </button>
          <button onClick={() => setShowNewTask(true)}
            style={{ background:'rgba(71,130,211,0.12)', color:'var(--blue)', border:'1px solid rgba(71,130,211,0.2)', borderRadius:4, padding:'6px 14px', fontSize:11, fontWeight:600, cursor:'pointer', fontFamily:'var(--font-body)' }}>
            + New Task
          </button>
        </div>
      </div>

      {/* Content */}
      <div style={{ flex:1, overflowY:'auto' }}>
        {subTab === 'pipeline' && <PipelineTab briefs={briefs} tasks={tasks} tierFilter={tierFilter} setTierFilter={setTierFilter}
          onExpand={b => { setExpandedBrief(b); logEvent('brief_card_expanded',{brief_id:b.id,column:b.status}); }}
          onAdvance={advanceBrief} platformColors={platformColors} platformLabels={platformLabels}
          briefAge={briefAge} gateCount={gateCount} onTaskStatusChange={(id,st)=>{Store.update('tasks',id,{status:st}); logEvent('task_status_changed',{task_id:id,to_status:st}); reload();}} />}
        {subTab === 'blocked' && <BlockedTab briefs={blockedBriefs} platformLabels={platformLabels} nav={nav} briefAge={briefAge}
          onNavigateBrief={b => { setSubTab('pipeline'); setExpandedBrief(b); }} />}
        {subTab === 'ops' && <OpsTab briefs={briefs} tasks={tasks} blockedBriefs={blockedBriefs} onGoBlocked={()=>setSubTab('blocked')} />}
        {subTab === 'experiments' && <ExperimentsTab experiments={experiments} reload={reload} showToast={nav.showToast} />}
        {subTab === 'deliverables' && <DeliverablesTab deliverables={deliverables} reload={reload} showToast={nav.showToast} />}
      </div>

      {/* Expanded Brief Drawer */}
      {expandedBrief && <BriefDrawer brief={expandedBrief} onClose={()=>setExpandedBrief(null)}
        onAdvance={advanceBrief} onToggleGate={toggleGate} onDelete={deleteBrief}
        onSaveTinyUrl={saveTinyUrl} platformColors={platformColors} platformLabels={platformLabels}
        gateCount={gateCount} briefAge={briefAge} reload={reload} />}

      {/* New Brief Modal */}
      {showNewBrief && <NewBriefModal onClose={()=>setShowNewBrief(false)} reload={reload} showToast={nav.showToast} />}

      {/* New Task Modal */}
      {showNewTask && <NewTaskModal onClose={()=>setShowNewTask(false)} reload={reload} showToast={nav.showToast} />}

      {/* Footer links */}
      <div style={{ display:'flex', gap:16, padding:'8px 0', borderTop:'1px solid rgba(71,130,211,0.08)', marginTop:8, fontSize:11 }}>
        {BRIEF_GENERATOR_URL && <a href={BRIEF_GENERATOR_URL} target="_blank" rel="noopener" style={{ color:'var(--blue)' }}>Social Brief Generator</a>}
        <a href="https://app.sendible.com" target="_blank" rel="noopener" style={{ color:'var(--blue)' }}>Open Sendible</a>
      </div>
    </div>
  );
}

/* --- Pipeline Tab (Kanban + Task Board) --- */
function PipelineTab({ briefs, tasks, tierFilter, setTierFilter, onExpand, onAdvance, platformColors, platformLabels, briefAge, gateCount, onTaskStatusChange }) {
  const kanbanBriefs = briefs.filter(b => b.status !== 'published');
  const colStyle = { minWidth:210, maxWidth:260, background:'rgba(26,47,168,0.15)', borderRadius:6, padding:10, flex:'0 0 auto' };
  const cardBg = { background:'var(--navy)', border:'1px solid rgba(71,130,211,0.1)', borderRadius:6, padding:10, marginBottom:8, cursor:'pointer', transition:'border-color 0.15s' };

  return (
    <div>
      {/* Kanban */}
      <div style={{ display:'flex', gap:12, overflowX:'auto', paddingBottom:12, minHeight:320 }}>
        {KANBAN_COLUMNS.map(col => {
          const cards = kanbanBriefs.filter(b => b.status === col.id).sort((a,b) => new Date(a.created_date) - new Date(b.created_date));
          return (
            <div key={col.id} style={colStyle}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8, paddingBottom:8, borderBottom:'1px solid rgba(71,130,211,0.1)' }}>
                <span style={{ fontWeight:700, fontSize:11, textTransform:'uppercase', color:'var(--muted)', fontFamily:'var(--font-body)' }}>{col.label}</span>
                <span style={{ fontSize:10, fontWeight:700, background:'rgba(71,130,211,0.1)', color:'var(--blue)', borderRadius:10, padding:'1px 6px' }}>{cards.length}</span>
              </div>
              {cards.length === 0 && (
                <div style={{ fontSize:10, color:'var(--muted)', textAlign:'center', padding:'20px 10px', opacity:0.6 }}>
                  {col.id === 'backlog' ? 'No briefs in backlog. Create one with + New Brief.' : 'Empty'}
                </div>
              )}
              {cards.map(b => {
                const gc = gateCount(b);
                const age = parseFloat(briefAge(b));
                const rule = STATUS_ADVANCE_RULES[b.status];
                return (
                  <div key={b.id} onClick={() => onExpand(b)} style={cardBg}
                    onMouseEnter={e => e.currentTarget.style.borderColor='rgba(71,130,211,0.3)'}
                    onMouseLeave={e => e.currentTarget.style.borderColor='rgba(71,130,211,0.1)'}>
                    {/* Aircraft */}
                    <div style={{ fontSize:12, fontWeight:600, color:'var(--white)', marginBottom:4 }}>
                      {b.aircraft_year} {b.aircraft_make} {b.aircraft_model}
                    </div>
                    {/* Platform pills */}
                    <div style={{ display:'flex', gap:3, marginBottom:4, flexWrap:'wrap' }}>
                      {(b.platforms||[]).map(p => (
                        <span key={p} style={{ fontSize:9, fontWeight:700, background:platformColors[p]||'#888', color:'#fff', borderRadius:3, padding:'1px 5px' }}>
                          {platformLabels[p]||p}
                        </span>
                      ))}
                      {b.approval_lane === 'yellow' && <span style={{ fontSize:9, fontWeight:700, background:'var(--amber)', color:'var(--navy)', borderRadius:3, padding:'1px 5px' }}>YELLOW</span>}
                    </div>
                    {/* Broker */}
                    <div style={{ fontSize:10, color:'var(--muted)', marginBottom:4 }}>Presented by: {b.broker_name}</div>
                    {/* Footer: age + gates */}
                    <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
                      <span style={{ fontSize:10, color: age > 2 ? 'var(--red)' : 'var(--muted)', fontWeight: age > 2 ? 700 : 400 }}>{age}d</span>
                      <span style={{ fontSize:10, color: gc.done === gc.total ? 'var(--green)' : 'var(--muted)' }}>{gc.done}/{gc.total}</span>
                    </div>
                    {/* Advance button */}
                    {rule && (
                      <button onClick={e => { e.stopPropagation(); onAdvance(b); }}
                        style={{ marginTop:6, width:'100%', fontSize:10, fontWeight:600, padding:'4px 0', borderRadius:3, border:'none', cursor:'pointer',
                          background: gc.done === gc.total || !rule.gate ? 'rgba(151,203,0,0.15)' : 'rgba(71,130,211,0.08)',
                          color: gc.done === gc.total || !rule.gate ? 'var(--green)' : 'var(--muted)' }}>
                        → {KANBAN_COLUMNS.find(c=>c.id===rule.next)?.label || rule.next}
                      </button>
                    )}
                  </div>
                );
              })}
            </div>
          );
        })}
      </div>

      {/* Task Board */}
      <div style={{ marginTop:16 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
          <div style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:13, color:'var(--white)' }}>Task Board</div>
          <div style={{ display:'flex', gap:0 }}>
            {['all','T1','T2','T3'].map(t => (
              <button key={t} onClick={() => setTierFilter(t)}
                style={{ background:'none', border:'none', borderBottom: tierFilter===t ? '2px solid var(--green)' : '2px solid transparent', color: tierFilter===t ? 'var(--white)' : 'var(--muted)', fontSize:10, fontWeight:600, padding:'4px 10px', cursor:'pointer', fontFamily:'var(--font-body)' }}>
                {t === 'all' ? 'All' : t}
              </button>
            ))}
          </div>
        </div>
        {tasks.filter(t => tierFilter === 'all' || t.tier === tierFilter)
          .sort((a,b) => { const tp = {T1:1,T2:2,T3:3}; if (tp[a.tier] !== tp[b.tier]) return tp[a.tier]-tp[b.tier]; return new Date(a.due_date)-new Date(b.due_date); })
          .sort((a,b) => (a.status==='done'?1:0) - (b.status==='done'?1:0))
          .map(t => {
            const overdue = t.status !== 'done' && new Date(t.due_date) < new Date();
            const tierColors = { T1:{ bg:'var(--red)',c:'#fff' }, T2:{ bg:'var(--amber)',c:'var(--navy)' }, T3:{ bg:'var(--blue)',c:'#fff' } };
            const tc = tierColors[t.tier] || tierColors.T3;
            const statusCycle = ['active','draft','review','approved','done'];
            return (
              <div key={t.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 0', borderBottom:'1px solid rgba(71,130,211,0.06)', opacity: t.status==='done' ? 0.5 : 1 }}>
                <span style={{ fontSize:10, fontWeight:700, background:tc.bg, color:tc.c, borderRadius:3, padding:'2px 6px', minWidth:22, textAlign:'center' }}>{t.tier}</span>
                <div style={{ flex:1, minWidth:0 }}>
                  <div style={{ fontSize:12, fontWeight:600, color: overdue ? 'var(--red)' : 'var(--white)', textDecoration: t.status==='done' ? 'line-through' : 'none' }}>
                    {overdue && t.status !== 'done' && <span style={{ fontWeight:700, marginRight:4 }}>OVERDUE</span>}
                    {t.title}
                  </div>

/* --- Blocked Tab --- */

  );

      {briefs.map(b => {

        const isNbaa = !b.info_gate_cleared && b.event_id === 'nbaa-sdc-2026';
        const missingGates = b.readiness_gates ? Object.entries(b.readiness_gates).filter(([k,v]) => !v).map(([k]) => READINESS_GATE_LABELS[k] || k) : [];
        const reason = !b.info_gate_cleared ? (b.info_gate_description || 'Info gate not cleared') : ('Missing: ' + missingGates.join(', '));
        return (
          <div key={b.id} style={{ display:'flex', alignItems:'center', gap:12, padding:'10px 0', borderBottom:'1px solid rgba(71,130,211,0.07)', borderLeft: isNbaa ? '3px solid var(--red)' : missingGates.length ? '3px solid var(--amber)' : 'none', paddingLeft: 10 }}>
            <div style={{ flex:1, minWidth:0 }}>
              <div style={{ fontSize:13, fontWeight:600, color:'var(--white)' }}>{b.aircraft_year} {b.aircraft_make} {b.aircraft_model}</div>
              <div style={{ fontSize:11, color:'var(--muted-light)', marginTop:2 }}>{(b.platforms||[]).map(p=>platformLabels[p]).join(', ')}</div>
              <div style={{ fontSize:11, color:'var(--amber)', marginTop:2 }}>{reason}</div>
            </div>
            <div style={{ fontSize:10, color:'var(--muted)', minWidth:50 }}>{TEAM_ROSTER.find(m=>m.key===b.owner)?.name.split(' ')[0] || b.owner}</div>
            <div style={{ fontSize:11, fontWeight: parseFloat(hrs) >= 24 ? 700 : 400, color: parseFloat(hrs) >= 24 ? 'var(--red)' : 'var(--muted)', minWidth:50 }}>{hrs}h</div>
            <button onClick={() => { if (isNbaa) nav.navigate('settings',{scroll_to:'nbaa_booth'}); else onNavigateBrief(b); }}
              style={{ fontSize:10, fontWeight:600, color:'var(--blue)', background:'none', border:'none', cursor:'pointer', padding:'4px 8px' }}>
              Unblock
            </button>
          </div>
        );
      })}
    </div>
  );
}

/* --- Ops Dashboard Tab --- */
function OpsTab({ briefs, tasks, blockedBriefs, onGoBlocked }) {
  const statusCounts = { backlog:0, brief_ready:0, in_production:0, ready_to_schedule:0, scheduled:0, published:0, blocked: blockedBriefs.length };
  briefs.forEach(b => { if (statusCounts[b.status] !== undefined) statusCounts[b.status]++; });

  const publishedBriefs = briefs.filter(b => b.status === 'published' && b.published_date);
  let medianCycle = null;
  if (publishedBriefs.length >= 3) {
    const times = publishedBriefs.map(b => (new Date(b.published_date) - new Date(b.created_date)) / 3600000).sort((a,b)=>a-b);
    medianCycle = times[Math.floor(times.length/2)].toFixed(0);
  }

  const slaBreach = briefs.filter(b => b.status === 'brief_ready' && (Date.now() - new Date(b.created_date).getTime()) > 86400000).length;

  const counterCards = [
    { label:'Backlog', val:statusCounts.backlog, color:'var(--blue)' },
    { label:'Brief Ready', val:statusCounts.brief_ready, color:'var(--blue)' },
    { label:'In Production', val:statusCounts.in_production, color:'var(--blue)' },
    { label:'Ready to Sched.', val:statusCounts.ready_to_schedule, color:'var(--blue)' },
    { label:'Scheduled', val:statusCounts.scheduled, color:'var(--blue)' },
    { label:'Blocked', val:statusCounts.blocked, color: statusCounts.blocked > 0 ? 'var(--red)' : 'var(--green)' }
  ];

  // Top blockers
  const topBlockers = blockedBriefs.sort((a,b) => new Date(a.created_date) - new Date(b.created_date)).slice(0, 3);

  // Swimlane workload
  const swimlaneCounts = {};
  Object.keys(SWIMLANES).forEach(k => swimlaneCounts[k] = { total:0, blocked:0 });
  // Simple assignment: group tasks by rough category
  tasks.forEach(t => {
    const key = t.tags?.some(g => g.includes('sponsor')) ? 'sponsor' : t.tags?.some(g => g.includes('experiment')) ? 'experiments' : 'content_production';
    if (swimlaneCounts[key]) { swimlaneCounts[key].total++; if (t.status === 'draft') swimlaneCounts[key].blocked++; }
  });

  return (
    <div>
      {/* Pipeline counters */}
      <div style={{ display:'grid', gridTemplateColumns:'repeat(6, 1fr)', gap:10, marginBottom:20 }}>
        {counterCards.map(c => (
          <div key={c.label} style={{ background:'rgba(71,130,211,0.06)', borderRadius:6, padding:'12px 10px', textAlign:'center' }}>
            <div style={{ fontSize:24, fontWeight:700, color:c.color, fontFamily:'var(--font-display)' }}>{c.val}</div>
            <div style={{ fontSize:10, color:'var(--muted)', marginTop:4 }}>{c.label}</div>
          </div>
        ))}
      </div>

      {/* Metrics row */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12, marginBottom:20 }}>
        <div style={{ background:'rgba(71,130,211,0.06)', borderRadius:6, padding:14 }}>
          <div style={{ fontSize:10, color:'var(--muted)', marginBottom:4, fontWeight:600 }}>Median Cycle Time</div>
          <div style={{ fontSize:20, fontWeight:700, color:'var(--white)', fontFamily:'var(--font-display)' }}>
            {medianCycle ? medianCycle + 'h' : 'Insufficient data'}
          </div>
          {!medianCycle && <div style={{ fontSize:10, color:'var(--muted)', marginTop:2 }}>Need 3+ published briefs</div>}
        </div>
        <div style={{ background:'rgba(71,130,211,0.06)', borderRadius:6, padding:14 }}>
          <div style={{ fontSize:10, color:'var(--muted)', marginBottom:4, fontWeight:600 }}>Review SLA Breaches</div>
          <div style={{ fontSize:20, fontWeight:700, color: slaBreach > 0 ? 'var(--amber)' : 'var(--green)', fontFamily:'var(--font-display)' }}>{slaBreach}</div>
          <div style={{ fontSize:10, color:'var(--muted)', marginTop:2 }}>Briefs in "Brief Ready" {'>'}24h</div>
        </div>
      </div>

      {/* Swimlane workload */}
      <div style={{ marginBottom:20 }}>
        <div style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:12, color:'var(--white)', marginBottom:8 }}>Workload by Swimlane</div>
        {Object.entries(SWIMLANES).map(([k, sw]) => {
          const data = swimlaneCounts[k] || { total:0, blocked:0 };
          return (
            <div key={k} style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
              <div style={{ fontSize:10, color:'var(--muted)', minWidth:120 }}>{sw.label}</div>
              <div style={{ flex:1, height:14, background:'rgba(71,130,211,0.06)', borderRadius:3, overflow:'hidden', position:'relative' }}>
                <div style={{ height:'100%', width: Math.min(data.total * 20, 100) + '%', background:sw.color, borderRadius:3, opacity:0.6 }} />
                {data.blocked > 0 && <div style={{ position:'absolute', right:0, top:0, height:'100%', width: Math.min(data.blocked * 20, 100) + '%', background:'var(--red)', borderRadius:3, opacity:0.5 }} />}
              </div>
              <span style={{ fontSize:10, color:'var(--muted)', minWidth:20 }}>{data.total}</span>
            </div>
          );
        })}
      </div>

      {/* Top Blockers */}
      <div>
        <div style={{ fontFamily:'var(--font-display)', fontWeight:700, fontSize:12, color:'var(--white)', marginBottom:8 }}>Top Blockers</div>
        {topBlockers.length === 0 && <div style={{ fontSize:11, color:'var(--green)' }}>No blocked items.</div>}
        {topBlockers.map(b => {
          const hrs = ((Date.now() - new Date(b.created_date).getTime()) / 3600000).toFixed(0);
          const missingGates = b.readiness_gates ? Object.entries(b.readiness_gates).filter(([k,v]) => !v).map(([k]) => READINESS_GATE_LABELS[k]||k) : [];
          return (
            <div key={b.id} onClick={onGoBlocked} style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 0', borderBottom:'1px solid rgba(71,130,211,0.06)', cursor:'pointer' }}>
              <div style={{ flex:1 }}>
                <div style={{ fontSize:12, fontWeight:600, color:'var(--white)' }}>{b.aircraft_year} {b.aircraft_make} {b.aircraft_model}</div>
                <div style={{ fontSize:10, color:'var(--amber)', marginTop:2 }}>Missing: {missingGates.join(', ')}</div>
              </div>
              <div style={{ fontSize:10, color:'var(--muted)' }}>{TEAM_ROSTER.find(m=>m.key===b.owner)?.name.split(' ')[0]}</div>
              <div style={{ fontSize:11, fontWeight:700, color:'var(--red)' }}>{hrs}h</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}
